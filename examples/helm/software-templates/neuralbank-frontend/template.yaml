apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: neuralbank-frontend
  title: "Neuralbank: Frontend"
  description: "Creates Neuralbank's frontend for credit visualization and management. Includes Tekton CI/CD pipeline, ArgoCD auto-deployment via ApplicationSet, and DevSpaces support. Webhooks are created automatically by a background CronJob."
  tags:
    - frontend
    - html
    - neuralbank
    - recommended
spec:
  owner: platform-engineering
  type: website
  parameters:
    - title: Application Information
      required:
        - name
        - owner
      properties:
        name:
          title: Application Name
          type: string
          default: neuralbank-frontend
          pattern: "^[a-z0-9-]+$"
          ui:autofocus: true
        description:
          title: Description
          type: string
          default: "Neuralbank credit visualization frontend"
        owner:
          title: User (OpenShift username)
          type: string
          description: "Your OpenShift username. Defines the deploy namespace: <username>-neuralbank"
          default: ${{ user.entity.metadata.name }}
          pattern: "^user[0-9]+$"
          ui:help: "E.g.: user1 → namespace user1-neuralbank"
        clusterDomain:
          title: Cluster Domain
          type: string
          default: "apps.cluster.example.com"
          ui:widget: hidden
  steps:
    - id: fetch-skeleton
      name: Generate Skeleton
      action: fetch:template
      input:
        url: ./skeleton
        values:
          name: ${{ parameters.name }}
          uniqueName: "${{ parameters.owner }}-${{ parameters.name }}"
          owner: ${{ parameters.owner }}
          description: ${{ parameters.description }}
          namespace: "${{ parameters.owner }}-neuralbank"
          imageRegistry: "image-registry.openshift-image-registry.svc:5000"
          clusterDomain: ${{ parameters.clusterDomain }}
    - id: publish
      name: Publish to Gitea
      action: publish:gitea
      input:
        repoUrl: "gitea-gitea.${{ parameters.clusterDomain }}?owner=ws-${{ parameters.owner }}&repo=${{ parameters.name }}"
        description: ${{ parameters.description }}
        defaultBranch: main
        repoVisibility: public
    - id: register
      name: Register in Catalog
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['publish'].output.repoContentsUrl }}
        catalogInfoPath: /main/catalog-info.yaml
    - id: notify
      name: Send Email Notification
      action: http:backstage:request
      input:
        method: POST
        path: /proxy/mailpit/api/v1/send
        headers:
          Content-Type: application/json
        body:
          From:
            Email: "developer-hub@redhat.local"
            Name: "Red Hat Developer Hub"
          To:
            - Email: "${{ parameters.owner }}@redhat.local"
              Name: "${{ parameters.owner }}"
          Subject: "Neuralbank Platform — Frontend Application Deployed"
          Text: "Neuralbank Platform Notification — Your frontend application ${{ parameters.owner }}-${{ parameters.name }} has been provisioned in namespace ${{ parameters.owner }}-neuralbank. The CI/CD pipeline is now building and deploying your application. Repository: ws-${{ parameters.owner }}/${{ parameters.name }}"
          HTML: "<div style='font-family:Red Hat Text,Helvetica,Arial,sans-serif;max-width:600px;margin:0 auto;border:1px solid #e0e0e0;border-radius:8px;overflow:hidden'><div style='background:#EE0000;padding:24px 32px;text-align:center'><h1 style='color:#fff;margin:0;font-size:22px;font-weight:600;letter-spacing:0.5px'>Neuralbank Platform</h1><p style='color:#ffcccc;margin:4px 0 0;font-size:12px'>Red Hat Developer Hub</p></div><div style='padding:32px'><h2 style='color:#151515;margin:0 0 16px;font-size:18px'>Frontend Application Deployed</h2><p style='color:#6a6e73;font-size:14px;line-height:1.6;margin:0 0 20px'>Your application has been successfully provisioned on the Neuralbank platform.</p><table style='width:100%;border-collapse:collapse;font-size:14px;margin-bottom:24px'><tr style='border-bottom:1px solid #f0f0f0'><td style='padding:10px 0;color:#6a6e73;width:140px'>Component</td><td style='padding:10px 0;color:#151515;font-weight:500'>${{ parameters.owner }}-${{ parameters.name }}</td></tr><tr style='border-bottom:1px solid #f0f0f0'><td style='padding:10px 0;color:#6a6e73'>Namespace</td><td style='padding:10px 0;color:#151515;font-weight:500'>${{ parameters.owner }}-neuralbank</td></tr><tr style='border-bottom:1px solid #f0f0f0'><td style='padding:10px 0;color:#6a6e73'>Repository</td><td style='padding:10px 0;color:#151515;font-weight:500'>ws-${{ parameters.owner }}/${{ parameters.name }}</td></tr><tr><td style='padding:10px 0;color:#6a6e73'>Pipeline</td><td style='padding:10px 0;color:#151515;font-weight:500'><span style='background:#faeae8;color:#c9190b;padding:2px 8px;border-radius:12px;font-size:12px'>Building</span></td></tr></table><p style='color:#6a6e73;font-size:13px;line-height:1.5;margin:0 0 24px'>The CI/CD pipeline (Tekton) is building the container image and deploying to your namespace. You can monitor progress from the <strong>CI</strong> tab in Developer Hub.</p></div><div style='background:#f0f0f0;padding:16px 32px;text-align:center;font-size:11px;color:#6a6e73'>Neuralbank Platform &bull; Powered by Red Hat Developer Hub</div></div>"
  output:
    links:
      - title: Repository
        url: ${{ steps['publish'].output.remoteUrl }}
      - title: View in Catalog
        icon: catalog
        entityRef: ${{ steps['register'].output.entityRef }}
