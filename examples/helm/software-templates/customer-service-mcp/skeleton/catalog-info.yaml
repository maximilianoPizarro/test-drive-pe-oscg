apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: ${{values.name}}
  description: ${{values.description}}
  annotations:
    backstage.io/kubernetes-id: ${{values.name}}
    backstage.io/kubernetes-namespace: ${{values.namespace}}
    argocd/app-name: ${{values.name}}
    argocd/app-namespace: openshift-gitops
    tektonci/build-namespace: ${{values.namespace}}
  tags:
    - java
    - quarkus
    - mcp
    - neuralbank
spec:
  type: service
  lifecycle: experimental
  owner: user:${{values.owner}}
  system: neuralbank
  providesApis:
    - ${{values.name}}-api
  dependsOn:
    - component:default/neuralbank-backend
---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: ${{values.name}}-api
  description: "MCP Server API for customer service AI agent"
spec:
  type: openapi
  lifecycle: experimental
  owner: user:${{values.owner}}
  system: neuralbank
  definition: |
    openapi: 3.0.0
    info:
      title: Customer Service MCP API
      version: 1.0.0
      description: >
        Model Context Protocol server for AI-powered customer service.
        Protected by Kuadrant OIDCPolicy (Keycloak OIDC) and
        RateLimitPolicy (60 req/min per user).
    paths:
      /mcp:
        post:
          summary: MCP protocol endpoint
