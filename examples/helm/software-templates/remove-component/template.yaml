apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: remove-component
  title: "Remove Component (Cleanup)"
  description: >
    Removes a previously created component from the platform:
    deletes the Gitea repository, unregisters from the catalog, and sends
    a notification. The ApplicationSet auto-prunes the ArgoCD
    Application when the repo disappears (~60s).
  tags:
    - cleanup
    - admin
    - remove
spec:
  owner: platform-engineering
  type: service
  parameters:
    - title: Component to Remove
      required:
        - name
        - owner
      properties:
        name:
          title: Component Name
          type: string
          description: "Base name of the component (e.g. neuralbank-backend)"
          pattern: "^[a-z0-9-]+$"
          ui:autofocus: true
          enum:
            - neuralbank-backend
            - neuralbank-frontend
            - customer-service-mcp
        owner:
          title: Owner (username)
          type: string
          description: "Owner of the component (e.g. user1)"
          default: ${{ user.entity.metadata.name }}
          pattern: "^user[0-9]+$"
          ui:help: "Auto-detected from your login. Change only if removing another user's component."
  steps:
    - id: delete-gitea-repo
      name: Delete Gitea Repository
      action: http:backstage:request
      continueOnError: true
      input:
        method: DELETE
        path: "/api/proxy/gitea/repos/ws-${{ parameters.owner }}/${{ parameters.name }}"
        headers:
          Content-Type: application/json

    - id: fetch-entity
      name: Fetch Catalog Entity
      action: http:backstage:request
      continueOnError: true
      input:
        method: GET
        path: "/api/catalog/entities/by-name/component/default/${{ parameters.owner }}-${{ parameters.name }}"

    - id: delete-entity
      name: Unregister from Catalog
      action: http:backstage:request
      continueOnError: true
      input:
        method: DELETE
        path: "/api/catalog/entities/by-uid/${{ steps['fetch-entity'].output.body.metadata.uid }}"

    - id: notify
      name: Send Email Notification
      action: http:backstage:request
      input:
        method: POST
        path: /proxy/mailpit/api/v1/send
        headers:
          Content-Type: application/json
        body:
          From:
            Email: "developer-hub@redhat.local"
            Name: "Red Hat Developer Hub"
          To:
            - Email: "${{ parameters.owner }}@redhat.local"
              Name: "${{ parameters.owner }}"
          Subject: "Component removed from platform"
          Text: "Component ${{ parameters.owner }}-${{ parameters.name }} has been removed. Gitea repository deleted. ArgoCD Application will be auto-pruned by the ApplicationSet (~60s)."
          HTML: "<h2>Component Removed</h2><p>Component <strong>${{ parameters.owner }}-${{ parameters.name }}</strong> has been removed from the platform.</p><ul><li>Gitea repository deleted</li><li>ArgoCD Application will be auto-pruned by the ApplicationSet (~60s)</li><li>Catalog entity unregistered</li></ul>"

  output:
    text:
      - title: Cleanup Complete
        content: |
          Component **${{ parameters.owner }}-${{ parameters.name }}** has been removed:
          1. Gitea repository `ws-${{ parameters.owner }}/${{ parameters.name }}` deleted
          2. ArgoCD Application auto-pruned by ApplicationSet (~60s)
          3. Backstage Catalog entity unregistered
          4. Notification sent
