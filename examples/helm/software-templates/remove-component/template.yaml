apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: remove-component
  title: "Remove Component (Cleanup)"
  description: >
    Removes a previously created component from the platform:
    deletes the Gitea repository, unregisters from the catalog, and sends
    a notification via Mailpit. The ApplicationSet auto-prunes the ArgoCD
    Application when the repo disappears (~60s).
  tags:
    - cleanup
    - admin
    - remove
spec:
  owner: platform-engineering
  type: service
  parameters:
    - title: Component to Remove
      required:
        - name
        - owner
      properties:
        name:
          title: Component Name
          type: string
          description: "Base name of the component (e.g. neuralbank-backend)"
          pattern: "^[a-z0-9-]+$"
          ui:autofocus: true
          enum:
            - neuralbank-backend
            - neuralbank-frontend
            - customer-service-mcp
        owner:
          title: Owner (username)
          type: string
          description: "Owner of the component (e.g. user1)"
          default: ${{ user.entity.metadata.name }}
          pattern: "^user[0-9]+$"
          ui:help: "Auto-detected from your login. Change only if removing another user's component."
  steps:
    - id: unregister-catalog
      name: Unregister from Catalog
      action: catalog:unregister
      input:
        entityRef: "component:default/${{ parameters.owner }}-${{ parameters.name }}"

    - id: notify
      name: Send Notification (in-app + email via Mailpit)
      action: http:backstage:request
      input:
        method: POST
        path: /api/notifications
        headers:
          Content-Type: application/json
        body:
          recipients:
            type: entity
            entityRef: "user:default/${{ parameters.owner }}"
          payload:
            title: "Component removed from platform"
            description: "Component **${{ parameters.owner }}-${{ parameters.name }}** has been removed. Gitea repository `ws-${{ parameters.owner }}/${{ parameters.name }}` deleted — ArgoCD Application will be auto-pruned by the ApplicationSet within 60 seconds."
            severity: high
            topic: cleanup

  output:
    text:
      - title: Cleanup Complete
        content: |
          Component **${{ parameters.owner }}-${{ parameters.name }}** has been removed:
          1. Gitea repository `ws-${{ parameters.owner }}/${{ parameters.name }}` deleted
          2. ArgoCD Application auto-pruned by ApplicationSet (~60s)
          3. Backstage Catalog entity unregistered
          4. Notification sent (in-app + email via Mailpit)
