apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: neuralbank-backend
  title: "Neuralbank: Backend API"
  description: "Crea el backend REST API de Neuralbank para gestión de créditos. Endpoints para consulta y actualización de créditos. Incluye Gateway, OIDCPolicy y RateLimitPolicy."
  tags:
    - java
    - quarkus
    - rest-api
    - neuralbank
    - recommended
spec:
  owner: platform-engineering
  type: service
  parameters:
    - title: Información de la Aplicación
      required:
        - name
        - owner
      properties:
        name:
          title: Nombre de la Aplicación
          type: string
          default: neuralbank-backend
          pattern: "^[a-z0-9-]+$"
          ui:autofocus: true
        description:
          title: Descripción
          type: string
          default: "Backend REST API para gestión de créditos de Neuralbank"
        owner:
          title: Usuario (OpenShift username)
          type: string
          description: "Tu usuario de OpenShift. Define el namespace de deploy: <usuario>-neuralbank"
          default: ${{ user.entity.metadata.name }}
          pattern: "^user[0-9]+$"
          ui:help: "Ej: user1 → namespace user1-neuralbank"
  steps:
    - id: fetch-skeleton
      name: Generar Skeleton
      action: fetch:template
      input:
        url: ./skeleton
        values:
          name: ${{ parameters.name }}
          owner: ${{ parameters.owner }}
          description: ${{ parameters.description }}
          namespace: "${{ parameters.owner }}-neuralbank"
          imageRegistry: "image-registry.openshift-image-registry.svc:5000"
    - id: publish
      name: Publicar en Gitea
      action: publish:gitea
      input:
        repoUrl: "gitea.gitea.svc.cluster.local:3000?owner=${{ parameters.owner }}&repo=${{ parameters.name }}"
        description: ${{ parameters.description }}
        defaultBranch: main
        repoVisibility: public
    - id: register
      name: Registrar en Catálogo
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['publish'].output.repoContentsUrl }}
        catalogInfoPath: /catalog-info.yaml
  output:
    links:
      - title: Repositorio
        url: ${{ steps['publish'].output.remoteUrl }}
      - title: Ver en Catálogo
        icon: catalog
        entityRef: ${{ steps['register'].output.entityRef }}
