apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: neuralbank-backend
  title: "Neuralbank: Backend API"
  description: "Creates Neuralbank's REST API backend for credit management. Includes Gateway, OIDCPolicy, RateLimitPolicy, Tekton CI/CD pipeline, and ArgoCD auto-deployment via ApplicationSet. Webhooks are created automatically by a background CronJob."
  tags:
    - java
    - quarkus
    - rest-api
    - neuralbank
    - recommended
spec:
  owner: platform-engineering
  type: service
  parameters:
    - title: Application Information
      required:
        - name
        - owner
      properties:
        name:
          title: Application Name
          type: string
          default: neuralbank-backend
          pattern: "^[a-z0-9-]+$"
          ui:autofocus: true
        description:
          title: Description
          type: string
          default: "Neuralbank REST API backend for credit management"
        owner:
          title: User (OpenShift username)
          type: string
          description: "Your OpenShift username. Defines the deploy namespace: <username>-neuralbank"
          default: ${{ user.entity.metadata.name }}
          pattern: "^user[0-9]+$"
          ui:help: "E.g.: user1 → namespace user1-neuralbank"
        clusterDomain:
          title: Cluster Domain
          type: string
          default: "apps.cluster-l9nhj.dynamic.redhatworkshops.io"
          ui:widget: hidden
  steps:
    - id: fetch-skeleton
      name: Generate Skeleton
      action: fetch:template
      input:
        url: ./skeleton
        values:
          name: ${{ parameters.name }}
          uniqueName: "${{ parameters.owner }}-${{ parameters.name }}"
          owner: ${{ parameters.owner }}
          description: ${{ parameters.description }}
          namespace: "${{ parameters.owner }}-neuralbank"
          imageRegistry: "image-registry.openshift-image-registry.svc:5000"
          clusterDomain: ${{ parameters.clusterDomain }}
    - id: publish
      name: Publish to Gitea
      action: publish:gitea
      input:
        repoUrl: "gitea-gitea.${{ parameters.clusterDomain }}?owner=ws-${{ parameters.owner }}&repo=${{ parameters.name }}"
        description: ${{ parameters.description }}
        defaultBranch: main
        repoVisibility: public
    - id: register
      name: Register in Catalog
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['publish'].output.repoContentsUrl }}
        catalogInfoPath: /main/catalog-info.yaml
    - id: notify
      name: Send Notification
      action: http:backstage:request
      input:
        method: POST
        path: /api/notifications
        headers:
          Content-Type: application/json
        body:
          recipients:
            type: entity
            entityRef: "user:default/${{ parameters.owner }}"
          payload:
            title: "Neuralbank Backend deployed successfully"
            description: "Your component **${{ parameters.owner }}-${{ parameters.name }}** has been created and deployed to namespace `${{ parameters.owner }}-neuralbank`. The CI/CD pipeline is building your application. Repository: ws-${{ parameters.owner }}/${{ parameters.name }}"
            link: "/catalog/default/component/${{ parameters.owner }}-${{ parameters.name }}"
            severity: normal
            topic: scaffolder
  output:
    links:
      - title: Repository
        url: ${{ steps['publish'].output.remoteUrl }}
      - title: View in Catalog
        icon: catalog
        entityRef: ${{ steps['register'].output.entityRef }}
