apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: neuralbank
  description: Neuralbank financial platform
spec:
  owner: user:${{values.owner}}
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: ${{values.name}}
  description: ${{values.description}}
  annotations:
    backstage.io/kubernetes-id: ${{values.name}}
    backstage.io/kubernetes-namespace: ${{values.namespace}}
    argocd/app-name: ${{values.name}}
    argocd/app-namespace: openshift-gitops
    tektonci/build-namespace: ${{values.namespace}}
  tags:
    - java
    - quarkus
    - rest-api
    - neuralbank
spec:
  type: service
  lifecycle: experimental
  owner: user:${{values.owner}}
  system: neuralbank
  providesApis:
    - ${{values.name}}-api
---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: ${{values.name}}-api
  description: "Neuralbank Credit Management REST API"
spec:
  type: openapi
  lifecycle: experimental
  owner: user:${{values.owner}}
  system: neuralbank
  definition: |
    openapi: 3.0.0
    info:
      title: Neuralbank Credit API
      version: 1.0.0
      description: >
        REST API for credit and customer management.
        Protected by Kuadrant OIDCPolicy (Keycloak OIDC) and
        RateLimitPolicy (60 req/min per user).
    paths:
      /api/customers:
        get:
          summary: List customers
      /api/credits:
        get:
          summary: List credits
      /api/credits/{id}/update:
        post:
          summary: Update credit status
