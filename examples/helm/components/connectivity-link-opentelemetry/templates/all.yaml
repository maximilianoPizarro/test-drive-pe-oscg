apiVersion: v1
kind: Namespace
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  name: openshift-opentelemetry
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: jaeger
  name: jaeger
  namespace: openshift-opentelemetry
spec:
  ports:
  - name: query
    port: 16686
    targetPort: 16686
  - name: otlp-grpc
    port: 4317
    targetPort: 4317
  selector:
    app: jaeger
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: jaeger
  name: jaeger
  namespace: openshift-opentelemetry
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jaeger
  template:
    metadata:
      labels:
        app: jaeger
    spec:
      containers:
      - env:
        - name: COLLECTOR_OTLP_ENABLED
          value: "true"
        image: quay.io/jaegertracing/all-in-one:1.55
        name: jaeger
        ports:
        - containerPort: 5775
          name: zipkin-compact
        - containerPort: 6831
          name: jaeger-compact
        - containerPort: 6832
          name: jaeger-binary
        - containerPort: 5778
          name: configs
        - containerPort: 16686
          name: query
        - containerPort: 4317
          name: otlp-grpc
        - containerPort: 4318
          name: otlp-http
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 128Mi
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: jaeger
  namespace: openshift-opentelemetry
spec:
  host: jaeger.apps.cluster-l9nhj.dynamic.redhatworkshops.io
  port:
    targetPort: query
  tls:
    termination: edge
  to:
    kind: Service
    name: jaeger
