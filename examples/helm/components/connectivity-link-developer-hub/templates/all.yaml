kind: ConfigMap
metadata:
  annotations:
    rhdh.redhat.com/backstage-name: developer-hub
  labels:
    rhdh.redhat.com/ext-config-sync: "true"
  name: rhdh-rbac-policy
  namespace: developer-hub
---
apiVersion: v1
kind: Secret
metadata:
  annotations:
    kubernetes.io/service-account.name: default
  name: developer-hub-k8s-sa-token
  namespace: developer-hub
type: kubernetes.io/service-account-token
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: lightspeed-stack
  namespace: developer-hub
data:
  lightspeed-stack.yaml: |
    name: Lightspeed Core Service (LCS)
    service:
      host: 0.0.0.0
      auth_enabled: false
      workers: 1
      color_log: true
      access_log: true
    llama_stack:
      use_as_library_client: false
      url: http://localhost:8321
    user_data_collection:
      feedback_enabled: true
      feedback_storage: "/tmp/data/feedback"
      transcripts_storage: "/tmp/data/transcripts"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: lightspeed-app-config
  namespace: developer-hub
  labels:
    rhdh.redhat.com/ext-config-sync: "true"
  annotations:
    rhdh.redhat.com/backstage-name: developer-hub
data:
  app-config-lightspeed.yaml: |
    backend:
      csp:
        upgrade-insecure-requests: false
        script-src:
          - "'self'"
          - "'unsafe-eval'"
          - https://cdn.jsdelivr.net
    lightspeed:
      prompts:
        - title: "Getting Started with Developer Hub"
          message: "Can you guide me through the first steps to start using Red Hat Developer Hub as a developer?"
        - title: "Software Templates"
          message: "How do I create and use Software Templates in Red Hat Developer Hub?"
        - title: "Neuralbank Platform"
          message: "What components make up the Neuralbank financial platform and how do they interact?"
        - title: "CI/CD with Tekton"
          message: "How are Tekton pipelines configured for CI/CD in this Developer Hub instance?"
---
apiVersion: v1
kind: Secret
metadata:
  name: llama-stack-secrets
  namespace: developer-hub
type: Opaque
stringData:
  VLLM_URL: "http://openshift-mcp-server-helm-litellm.openshift-lightspeed.svc:4000/v1"
  VLLM_API_KEY: "sk-openshift-mcp-1234"
  VLLM_MAX_TOKENS: "4096"
  VLLM_TLS_VERIFY: "false"
  VALIDATION_PROVIDER: "vllm"
  VALIDATION_MODEL_NAME: "qwen3-8b"
---
apiVersion: rhdh.redhat.com/v1alpha3
kind: Backstage
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  name: developer-hub
  namespace: developer-hub
spec:
  application:
    appConfig:
      configMaps:
      - name: app-config-rhdh
      - name: lightspeed-app-config
      mountPath: /opt/app-root/src
    dynamicPluginsConfigMapName: dynamic-plugins-rhdh
    extraEnvs:
      secrets:
      - name: secrets-rhdh
      - name: llama-stack-secrets
      - key: token
        name: developer-hub-k8s-sa-token
    extraFiles:
      configMaps:
      - name: rhdh-rbac-policy
      mountPath: /opt/app-root/src
    replicas: 1
    route:
      enabled: true
  database:
    enableLocalDb: true
  deployment:
    patch:
      spec:
        template:
          spec:
            automountServiceAccountToken: true
            volumes:
              - name: dynamic-plugins-root
                ephemeral:
                  volumeClaimTemplate:
                    spec:
                      accessModes:
                        - ReadWriteOnce
                      resources:
                        requests:
                          storage: 4Gi
              - name: lightspeed-stack
                configMap:
                  name: lightspeed-stack
              - name: shared-storage
                emptyDir: {}
              - name: rag-data-volume
                emptyDir: {}
            initContainers:
              - name: init-rag-data
                image: "quay.io/redhat-ai-dev/rag-content:release-1.8-lcs"
                command:
                  - "sh"
                  - "-c"
                  - "echo 'Copying RAG data...'; cp -r /rag/vector_db/rhdh_product_docs /data/ && cp -r /rag/embeddings_model /data/ && echo 'Copy complete.'"
                volumeMounts:
                  - mountPath: /data
                    name: rag-data-volume
            containers:
              - name: backstage-backend
                env:
                  - name: NODE_TLS_REJECT_UNAUTHORIZED
                    value: "0"
              - name: llama-stack
                image: "quay.io/redhat-ai-dev/llama-stack:0.1.1"
                envFrom:
                  - secretRef:
                      name: llama-stack-secrets
                volumeMounts:
                  - mountPath: /app-root/.llama
                    name: shared-storage
                  - mountPath: /app-root/embeddings_model
                    name: rag-data-volume
                    subPath: embeddings_model
                  - mountPath: /app-root/vector_db/rhdh_product_docs
                    name: rag-data-volume
                    subPath: rhdh_product_docs
              - name: lightspeed-core
                image: "quay.io/lightspeed-core/lightspeed-stack:dev-20251021-ee9f08f"
                volumeMounts:
                  - mountPath: /app-root/lightspeed-stack.yaml
                    name: lightspeed-stack
                    subPath: lightspeed-stack.yaml
                  - mountPath: /tmp/data
                    name: shared-storage
