apiVersion: v1
data:
  app-config-rhdh.yaml: |
    app:
      title: Developer Hub
      baseUrl: "${RHDH_BASE_URL}"
    integrations:
      gitea:
        - host: gitea-gitea.{{ .Values.clusterDomain }}
          apiBaseUrl: https://gitea-gitea.{{ .Values.clusterDomain }}/api/v1
          username: gitea_admin
          password: "openshift"
    auth:
      environment: production
      session:
        secret: "${BACKEND_SECRET}"
      providers:
        oidc:
          production:
            metadataUrl: "${KEYCLOAK_METADATA_URL}"
            clientId: "${KEYCLOAK_CLIENT_ID}"
            clientSecret: "${KEYCLOAK_CLIENT_SECRET}"
            callbackUrl: "${RHDH_CALLBACK_URL}"
            prompt: auto
            signIn:
              resolvers:
                - resolver: preferredUsernameMatchingUserEntityName
                - resolver: emailMatchingUserEntityProfileEmail
    backend:
      auth:
        externalAccess:
          - type: static
            options:
              token: ${BACKEND_SECRET}
              subject: admin-curl-access
      baseUrl: "${RHDH_BASE_URL}"
      cors:
        origin: "${RHDH_BASE_URL}"
      csp:
        upgrade-insecure-requests: false
        frame-ancestors:
          - "'self'"
          - "https://*.{{ .Values.clusterDomain }}"
        img-src:
          - "'self'"
          - "data:"
          - https://img.shields.io
      reading:
        allow:
          - host: github.com
          - host: raw.githubusercontent.com
          - host: gitea-gitea.{{ .Values.clusterDomain }}
    signInPage: oidc
    catalog:
      providers:
        keycloakOrg:
          default:
            baseUrl: "${KEYCLOAK_BASE_URL}"
            loginRealm: "${KEYCLOAK_REALM}"
            realm: "${KEYCLOAK_REALM}"
            clientId: "${KEYCLOAK_CLIENT_ID}"
            clientSecret: "${KEYCLOAK_CLIENT_SECRET}"
            schedule:
              frequency: { minutes: 1 }
              timeout: { minutes: 5 }
              initialDelay: { seconds: 15 }
      locations:
        - type: url
          target: https://github.com/maximilianoPizarro/field-sourced-content-template/blob/main/examples/helm/software-templates/templates-catalog.yaml
      rules:
        - allow: [Component, Group, User, Resource, Location, Template, API, APIProduct, System, Domain]
    proxy:
      endpoints:
        '/gitea':
          target: "https://gitea-gitea.{{ .Values.clusterDomain }}/api/v1"
          allowedMethods: ['GET', 'POST', 'PUT', 'DELETE']
          headers:
            Authorization: "Basic Z2l0ZWFfYWRtaW46b3BlbnNoaWZ0"
        '/k8s-api':
          target: "https://kubernetes.default.svc"
          changeOrigin: true
          secure: false
          allowedMethods: ['GET', 'POST', 'PUT', 'PATCH', 'DELETE']
          headers:
            Authorization: "Bearer ${token}"
    argocd:
      appLocatorMethods:
        - type: 'config'
          instances:
            - name: openshift-gitops
              url: ${ARGOCD_INSTANCE_2_URL}
              username: ${ARGOCD_INSTANCE_2_USERNAME}
              password: ${ARGOCD_INSTANCE_2_PASSWORD}
    kubernetes:
      serviceLocatorMethod:
        type: 'multiTenant'
      clusterLocatorMethods:
        - type: 'config'
          clusters:
            - url: 'https://kubernetes.default.svc'
              name: 'local'
              authProvider: 'serviceAccount'
              serviceAccountToken: ${token}
              skipTLSVerify: true
              skipMetricsLookup: false
      customResources:
        - group: 'tekton.dev'
          apiVersion: 'v1'
          plural: 'pipelineruns'
        - group: 'tekton.dev'
          apiVersion: 'v1'
          plural: 'taskruns'
        - group: 'route.openshift.io'
          apiVersion: 'v1'
          plural: 'routes'
        - group: 'argoproj.io'
          apiVersion: 'v1alpha1'
          plural: 'rollouts'
    notifications:
      processors:
        email:
          transportConfig:
            transport: smtp
            hostname: n8n-mailpit.openshift-lightspeed.svc
            port: 1025
            secure: false
          sender: "devhub@neuralbank.io"
          replyTo: "noreply@neuralbank.io"
          broadcastConfig:
            receiver: none
          cache:
            ttl: { minutes: 30 }
    permission:
      enabled: true
      rbac:
        policies-csv-file: /opt/app-root/src/rbac-policy.csv
        policyFileReload: true
        admin:
          users:
            - name: user:default/maximilianopizarro
            - name: user:default/platformadmin
    enabled:
      kubernetes: true
      techdocs: true
      argocd: true
      sonarqube: false
      keycloak: true
      ocm: false
      gitlab: false
      github: false
      gitlabOrg: false
      jenkins: false
      permission: false
      kuadrant: true
