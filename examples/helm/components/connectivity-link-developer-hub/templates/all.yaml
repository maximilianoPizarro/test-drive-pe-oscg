apiVersion: v1
data:
  rbac-policy.csv: "# ==========================================================\n#
    1. BASE PERMISSIONS FOR ALL AUTHENTICATED USERS\n# ==========================================================\n#
    The 'role:default/authenticated' role is automatically assigned to any logged-in
    user.\n# These permissions apply to ALL users\n\n# Lightspeed permissions for
    ALL users\np, role:default/authenticated, lightspeed.chat.read, read, allow\np,
    role:default/authenticated, lightspeed.chat.create, create, allow\np, role:default/authenticated,
    lightspeed.chat.delete, delete, allow\n\n# Kuadrant api-consumer permissions for
    ALL authenticated users (rbac-backend does not support role inheritance)\np, role:default/authenticated,
    kuadrant.apiproduct.read.all, read, allow\np, role:default/authenticated, kuadrant.apiproduct.list,
    read, allow\np, role:default/authenticated, kuadrant.apikey.create, create, allow,
    apiproduct:*/*\np, role:default/authenticated, kuadrant.apikey.read.own, read,
    allow\np, role:default/authenticated, kuadrant.apikey.read.all, read, allow\np,
    role:default/authenticated, kuadrant.apikey.update.own, update, allow\np, role:default/authenticated,
    kuadrant.apikey.delete.own, delete, allow\np, role:default/authenticated, kuadrant.apikey.list,
    read, allow\n# HTTPRoutes: kuadrant.httproute.list (API publishing dropdown -
    see permissions.ts)\np, role:default/authenticated, kuadrant.httproute.list, read,
    allow\n# AuthPolicy/RateLimitPolicy: list for reference (API Owners/Admins)\np,
    role:default/authenticated, kuadrant.authpolicy.list, read, allow\np, role:default/authenticated,
    kuadrant.ratelimitpolicy.list, read, allow\n\n# Catalog permissions for ALL users\np,
    role:default/authenticated, catalog-entity, read, allow\np, role:default/authenticated,
    catalog.location, read, allow\n\n# Scaffolder permissions for ALL users\np, role:default/authenticated,
    scaffolder-template, read, allow\np, role:default/authenticated, scaffolder.task.read,
    read, allow\np, role:default/authenticated, scaffolder.task.create, create, allow\np,
    role:default/authenticated, scaffolder.action.execute, use, allow\n\n# Adoption
    Insights permissions for ALL users\np, role:default/authenticated, adoption-insights.events.read,
    read, allow\n\n# ==========================================================\n#
    2. PLATFORM ENGINEER ROLE (Full Admin Permissions)\n# ==========================================================\n#
    Define a comprehensive 'admin' role\np, role:default/platformengineer, lightspeed.chat.read,
    read, allow\np, role:default/platformengineer, lightspeed.chat.create, create,
    allow\np, role:default/platformengineer, lightspeed.chat.delete, delete, allow\n\np,
    role:default/platformengineer, catalog-entity, read, allow\np, role:default/platformengineer,
    catalog-entity, create, allow\np, role:default/platformengineer, catalog-entity,
    update, allow\np, role:default/platformengineer, catalog-entity, delete, allow\n\np,
    role:default/platformengineer, catalog.location, read, allow\np, role:default/platformengineer,
    catalog.location, create, allow\np, role:default/platformengineer, catalog.location,
    delete, allow\n\np, role:default/platformengineer, catalog.entity.create, create,
    allow\np, role:default/platformengineer, scaffolder-template, read, allow\np,
    role:default/platformengineer, scaffolder.task.read, read, allow\np, role:default/platformengineer,
    scaffolder.task.create, create, allow\np, role:default/platformengineer, scaffolder.task.cancel,
    use, allow\np, role:default/platformengineer, scaffolder.action.execute, use,
    allow\n\np, role:default/platformengineer, permission.policy, read, allow\np,
    role:default/platformengineer, catalog.entity.read, read, allow\n\n# Kuadrant
    api-admin permissions for Platform Engineers (rbac-backend does not support role
    inheritance)\np, role:default/platformengineer, kuadrant.planpolicy.read, read,
    allow\np, role:default/platformengineer, kuadrant.planpolicy.list, read, allow\np,
    role:default/platformengineer, kuadrant.apiproduct.create, create, allow\np, role:default/platformengineer,
    kuadrant.apiproduct.read.all, read, allow\np, role:default/platformengineer, kuadrant.apiproduct.update.all,
    update, allow\np, role:default/platformengineer, kuadrant.apiproduct.delete.all,
    delete, allow\np, role:default/platformengineer, kuadrant.apiproduct.list, read,
    allow\np, role:default/platformengineer, kuadrant.apikey.create, create, allow,
    apiproduct:*/*\np, role:default/platformengineer, kuadrant.apikey.read.own, read,
    allow\np, role:default/platformengineer, kuadrant.apikey.read.all, read, allow\np,
    role:default/platformengineer, kuadrant.apikey.update.all, update, allow\np, role:default/platformengineer,
    kuadrant.apikey.delete.all, delete, allow\np, role:default/platformengineer, kuadrant.apikey.list,
    read, allow\np, role:default/platformengineer, kuadrant.apikey.approve, update,
    allow\n# HTTPRoutes: kuadrant.httproute.list (see permissions.ts)\np, role:default/platformengineer,
    kuadrant.httproute.list, read, allow\n\n# Adoption Insights permissions for Platform
    Engineers\np, role:default/platformengineer, adoption-insights.events.read, read,
    allow\n\n# ==========================================================\n# 3. USER
    ROLE ASSIGNMENTS\n# ==========================================================\n#
    Assign users to roles based on their groups\n# Following the pattern: g, user:default/<username>,
    role:default/<rolename>\n\n# Platform Engineers (Full Admin Permissions)\n# Users
    in infrastructure, platformengineers, and rhdh groups get admin role\ng, user:default/maximilianopizarro,
    role:default/platformengineer\n# maximilianopizarro: full Kuadrant permissions
    (api-admin + api-owner for API keys, requests, approval)\ng, user:default/maximilianopizarro,
    role:default/api-admin\ng, user:default/maximilianopizarro, role:default/api-owner\ng,
    user:default/user1, role:default/authenticated\ng, user:default/user2, role:default/authenticated\ng, user:default/user3, role:default/authenticated\ng, user:default/user4, role:default/authenticated\ng, user:default/user5, role:default/authenticated\ng, user:default/user6, role:default/authenticated\ng, user:default/user7, role:default/authenticated\ng, user:default/user8, role:default/authenticated\ng, user:default/user9, role:default/authenticated\ng, user:default/user10, role:default/authenticated\ng, user:default/user11, role:default/authenticated\ng, user:default/user12, role:default/authenticated\ng, user:default/user13, role:default/authenticated\ng, user:default/user14, role:default/authenticated\ng, user:default/user15, role:default/authenticated\ng, user:default/user16, role:default/authenticated\ng, user:default/user17, role:default/authenticated\ng, user:default/user18, role:default/authenticated\ng, user:default/user19, role:default/authenticated\ng, user:default/user20, role:default/authenticated\ng, user:default/user21, role:default/authenticated\ng, user:default/user22, role:default/authenticated\ng, user:default/user23, role:default/authenticated\ng, user:default/user24, role:default/authenticated\ng, user:default/user25, role:default/authenticated\ng, user:default/user26, role:default/authenticated\ng, user:default/user27, role:default/authenticated\ng, user:default/user28, role:default/authenticated\ng, user:default/user29, role:default/authenticated\ng, user:default/user30, role:default/authenticated\n\n#
    Group assignments (Keycloak groups)\n# Assign rhdh group to platformengineer role
    (has all permissions including Adoption Insights)\ng, group:default/rhdh, role:default/platformengineer\n\n#
    ==========================================================\n# 4. KUADRANT PLUGIN
    ROLES\n# ==========================================================\n# api-consumer:
    browses APIs, requests access\np, role:default/api-consumer, kuadrant.apiproduct.read.all,
    read, allow\np, role:default/api-consumer, kuadrant.apiproduct.list, read, allow\np,
    role:default/api-consumer, kuadrant.apikey.create, create, allow, apiproduct:*/*\np,
    role:default/api-consumer, kuadrant.apikey.read.own, read, allow\np, role:default/api-consumer,
    kuadrant.apikey.update.own, update, allow\np, role:default/api-consumer, kuadrant.apikey.delete.own,
    delete, allow\np, role:default/api-consumer, kuadrant.apikey.list, read, allow\np,
    role:default/api-consumer, catalog.entity.read, read, allow\n\n# api-owner: publishes
    APIs they own, approves requests for their APIs\np, role:default/api-owner, kuadrant.planpolicy.read,
    read, allow\np, role:default/api-owner, kuadrant.planpolicy.list, read, allow\np,
    role:default/api-owner, kuadrant.apiproduct.create, create, allow\np, role:default/api-owner,
    kuadrant.apiproduct.read.all, read, allow\np, role:default/api-owner, kuadrant.apiproduct.update.own,
    update, allow\np, role:default/api-owner, kuadrant.apiproduct.delete.own, delete,
    allow\np, role:default/api-owner, kuadrant.apiproduct.list, read, allow\np, role:default/api-owner,
    kuadrant.apikey.create, create, allow, apiproduct:*/*\np, role:default/api-owner,
    kuadrant.apikey.read.own, read, allow\np, role:default/api-owner, kuadrant.apikey.update.own,
    update, allow\np, role:default/api-owner, kuadrant.apikey.delete.own, delete,
    allow\np, role:default/api-owner, kuadrant.apikey.list, read, allow\np, role:default/api-owner,
    kuadrant.apikey.approve, update, allow\np, role:default/api-owner, kuadrant.httproute.list,
    read, allow\np, role:default/api-owner, catalog.entity.read, read, allow\n\n#
    api-admin: platform engineers who manage all API products\np, role:default/api-admin,
    kuadrant.planpolicy.read, read, allow\np, role:default/api-admin, kuadrant.planpolicy.list,
    read, allow\np, role:default/api-admin, kuadrant.apiproduct.create, create, allow\np,
    role:default/api-admin, kuadrant.apiproduct.read.all, read, allow\np, role:default/api-admin,
    kuadrant.apiproduct.update.all, update, allow\np, role:default/api-admin, kuadrant.apiproduct.delete.all,
    delete, allow\np, role:default/api-admin, kuadrant.apiproduct.list, read, allow\np,
    role:default/api-admin, kuadrant.apikey.create, create, allow, apiproduct:*/*\np,
    role:default/api-admin, kuadrant.apikey.read.own, read, allow\np, role:default/api-admin,
    kuadrant.apikey.read.all, read, allow\np, role:default/api-admin, kuadrant.apikey.update.all,
    update, allow\np, role:default/api-admin, kuadrant.apikey.delete.all, delete,
    allow\np, role:default/api-admin, kuadrant.apikey.list, read, allow\np, role:default/api-admin,
    kuadrant.apikey.approve, update, allow\np, role:default/api-admin, kuadrant.httproute.list,
    read, allow\np, role:default/api-admin, catalog.entity.read, read, allow\n\n#
    ==========================================================\n# 5. LEGACY ROLES
    (Optional - for backward compatibility)\n# ==========================================================\n#
    If you still want the 'rhdhpai-users' role for other users, keep its definition:\np,
    role:default/rhdhpai-users, lightspeed.chat.read, read, allow\np, role:default/rhdhpai-users,
    lightspeed.chat.create, create, allow\np, role:default/rhdhpai-users, lightspeed.chat.delete,
    delete, allow    \np, role:default/rhdhpai-users, catalog-entity, read, allow\np,
    role:default/rhdhpai-users, catalog-entity, update, allow\np, role:default/rhdhpai-users,
    catalog-entity, delete, allow\np, role:default/rhdhpai-users, catalog.location.read,
    read, allow\np, role:default/rhdhpai-users, catalog.location.create, create, allow\np,
    role:default/rhdhpai-users, catalog.location.delete, delete, allow\np, role:default/rhdhpai-users,
    catalog.entity.create, create, allow\np, role:default/rhdhpai-users, scaffolder-template,
    read, allow\np, role:default/rhdhpai-users, scaffolder.task.read, read, allow\np,
    role:default/rhdhpai-users, scaffolder.task.create, create, allow\n\n# Adoption
