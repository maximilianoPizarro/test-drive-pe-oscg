clusterDomain: apps.cluster-8wffz.dynamic.redhatworkshops.io

# ============================================================
# n8n — Workflow automation (from charts.openshift.io)
# ============================================================
n8n:
  enableServiceLinks: false
  podSecurityContext: {}
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: false
    runAsNonRoot: true
  route:
    enabled: true
    host: n8n.apps.cluster-8wffz.dynamic.redhatworkshops.io
    tls:
      termination: edge
  main:
    config:
      n8n:
        smtp_host: "n8n-mailpit"
        smtp_port: "1025"
        smtp_ssl: "false"
    extraEnvVars:
      N8N_LISTEN_ADDRESS: "0.0.0.0"
      NODE_FUNCTION_ALLOW_BUILTIN: "*"
      NODE_FUNCTION_ALLOW_EXTERNAL: "*"
    persistence:
      enabled: false
  mailpit:
    enabled: true
    podSecurityContext: {}
    route:
      enabled: true
  workflows:
    autoImport:
      enabled: true
      urls:
        - https://gitlab.com/maximilianoPizarro/connectivity-link/-/raw/main/n8n/workflows/workflow-pod-monitor-mcp-agent.json
        - https://gitlab.com/maximilianoPizarro/connectivity-link/-/raw/main/n8n/workflows/workflow-pod-monitor-mcp-granite.json
        - https://gitlab.com/maximilianoPizarro/connectivity-link/-/raw/main/n8n/workflows/workflow-deployment-rollout-status.json
        - https://gitlab.com/maximilianoPizarro/connectivity-link/-/raw/main/n8n/workflows/workflow-resource-quota-monitor.json
        - https://gitlab.com/maximilianoPizarro/connectivity-link/-/raw/main/n8n/workflows/workflow-security-audit.json
        - https://gitlab.com/maximilianoPizarro/connectivity-link/-/raw/main/n8n/workflows/workflow-route-tls-expiry.json
        - https://gitlab.com/maximilianoPizarro/connectivity-link/-/raw/main/n8n/workflows/workflow-event-anomaly-detector.json
        - https://gitlab.com/maximilianoPizarro/connectivity-link/-/raw/main/n8n/workflows/workflow-cluster-test-suite.json
        - https://gitlab.com/maximilianoPizarro/connectivity-link/-/raw/main/n8n/workflows/workflow-cluster-revert.json
        - https://gitlab.com/maximilianoPizarro/connectivity-link/-/raw/main/n8n/workflows/workflow-openshift-health-dashboard.json
        - https://gitlab.com/maximilianoPizarro/connectivity-link/-/raw/main/n8n/workflows/workflow-resource-provisioner.json
        - https://gitlab.com/maximilianoPizarro/connectivity-link/-/raw/main/n8n/workflows/workflow-node-capacity-monitor.json
        - https://gitlab.com/maximilianoPizarro/connectivity-link/-/raw/main/n8n/workflows/workflow-pod-top-monitor.json
        - https://gitlab.com/maximilianoPizarro/connectivity-link/-/raw/main/n8n/workflows/workflow-namespace-inventory.json
        - https://gitlab.com/maximilianoPizarro/connectivity-link/-/raw/main/n8n/workflows/workflow-pvc-storage-monitor.json
        - https://gitlab.com/maximilianoPizarro/connectivity-link/-/raw/main/n8n/workflows/workflow-operator-health-check.json
        - https://gitlab.com/maximilianoPizarro/connectivity-link/-/raw/main/n8n/workflows/workflow-mcp-gateway-status.json

# ============================================================
# openshift-mcp-server — MCP servers + LiteLLM proxy + Inspector
# (from maximilianopizarro.github.io/openshift-mcp-server)
# ============================================================
openshift-mcp-server:
  namespace: openshift-lightspeed
  litellm:
    enabled: true
    masterKey: "sk-openshift-mcp-1234"
    model:
      name: llama-scout-17b
      modelId: llama-scout-17b
      apiBase: "https://litellm-prod.apps.maas.redhatworkshops.io/v1"
      apiKey: "sk-9guuWZPNUC0zY5KS3kbFLA"
    postgres:
      enabled: true
    route:
      enabled: true
      tls:
        termination: edge
  inspector:
    enabled: true
    route:
      enabled: true
  kubernetesMcp:
    enabled: true
    toolsets: "core,helm"
  serviceAccount:
    create: true
    scope: cluster
    clusterRole: cluster-admin
  olsConfig:
    enabled: false
