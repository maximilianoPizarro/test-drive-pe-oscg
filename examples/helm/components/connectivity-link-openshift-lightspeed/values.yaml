clusterDomain: ""
llmApiKey: ""
llmEndpoint: "https://litellm-prod.apps.maas.redhatworkshops.io/v1"
llmModel: "granite-3-2-8b-instruct"

# ============================================================
# n8n — Workflow automation (from charts.openshift.io)
# ============================================================
n8n:
  fullnameOverride: n8n
  enableServiceLinks: false
  podSecurityContext: {}
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: false
    runAsNonRoot: true
  route:
    enabled: true
    host: ""
    tls:
      termination: edge
  main:
    config:
      n8n:
        smtp_host: "n8n-mailpit"
        smtp_port: "1025"
        smtp_ssl: "false"
    extraEnvVars:
      N8N_LISTEN_ADDRESS: "0.0.0.0"
      NODE_FUNCTION_ALLOW_BUILTIN: "*"
      NODE_FUNCTION_ALLOW_EXTERNAL: "*"
    persistence:
      enabled: false
  mailpit:
    enabled: true
    podSecurityContext: {}
    route:
      enabled: true
  workflows:
    autoImport:
      enabled: true
      urls:
        - https://raw.githubusercontent.com/maximilianoPizarro/field-sourced-content-template/main/examples/helm/components/connectivity-link-openshift-lightspeed/workflows/workflow-pod-monitor-mcp-agent.json
        - https://raw.githubusercontent.com/maximilianoPizarro/field-sourced-content-template/main/examples/helm/components/connectivity-link-openshift-lightspeed/workflows/workflow-pod-monitor-mcp-granite.json
        - https://raw.githubusercontent.com/maximilianoPizarro/field-sourced-content-template/main/examples/helm/components/connectivity-link-openshift-lightspeed/workflows/workflow-deployment-rollout-status.json
        - https://raw.githubusercontent.com/maximilianoPizarro/field-sourced-content-template/main/examples/helm/components/connectivity-link-openshift-lightspeed/workflows/workflow-resource-quota-monitor.json
        - https://raw.githubusercontent.com/maximilianoPizarro/field-sourced-content-template/main/examples/helm/components/connectivity-link-openshift-lightspeed/workflows/workflow-security-audit.json
        - https://raw.githubusercontent.com/maximilianoPizarro/field-sourced-content-template/main/examples/helm/components/connectivity-link-openshift-lightspeed/workflows/workflow-route-tls-expiry.json
        - https://raw.githubusercontent.com/maximilianoPizarro/field-sourced-content-template/main/examples/helm/components/connectivity-link-openshift-lightspeed/workflows/workflow-event-anomaly-detector.json
        - https://raw.githubusercontent.com/maximilianoPizarro/field-sourced-content-template/main/examples/helm/components/connectivity-link-openshift-lightspeed/workflows/workflow-cluster-test-suite.json
        - https://raw.githubusercontent.com/maximilianoPizarro/field-sourced-content-template/main/examples/helm/components/connectivity-link-openshift-lightspeed/workflows/workflow-cluster-revert.json
        - https://raw.githubusercontent.com/maximilianoPizarro/field-sourced-content-template/main/examples/helm/components/connectivity-link-openshift-lightspeed/workflows/workflow-openshift-health-dashboard.json
        - https://raw.githubusercontent.com/maximilianoPizarro/field-sourced-content-template/main/examples/helm/components/connectivity-link-openshift-lightspeed/workflows/workflow-resource-provisioner.json
        - https://raw.githubusercontent.com/maximilianoPizarro/field-sourced-content-template/main/examples/helm/components/connectivity-link-openshift-lightspeed/workflows/workflow-node-capacity-monitor.json
        - https://raw.githubusercontent.com/maximilianoPizarro/field-sourced-content-template/main/examples/helm/components/connectivity-link-openshift-lightspeed/workflows/workflow-pod-top-monitor.json
        - https://raw.githubusercontent.com/maximilianoPizarro/field-sourced-content-template/main/examples/helm/components/connectivity-link-openshift-lightspeed/workflows/workflow-namespace-inventory.json
        - https://raw.githubusercontent.com/maximilianoPizarro/field-sourced-content-template/main/examples/helm/components/connectivity-link-openshift-lightspeed/workflows/workflow-pvc-storage-monitor.json
        - https://raw.githubusercontent.com/maximilianoPizarro/field-sourced-content-template/main/examples/helm/components/connectivity-link-openshift-lightspeed/workflows/workflow-operator-health-check.json
        - https://raw.githubusercontent.com/maximilianoPizarro/field-sourced-content-template/main/examples/helm/components/connectivity-link-openshift-lightspeed/workflows/workflow-mcp-gateway-status.json
        - https://raw.githubusercontent.com/maximilianoPizarro/field-sourced-content-template/main/examples/helm/components/connectivity-link-openshift-lightspeed/workflows/workflow-lightspeed-agent.json

# ============================================================
# openshift-mcp-server — MCP servers + LiteLLM proxy + Inspector
# (from maximilianopizarro.github.io/openshift-mcp-server)
# ============================================================
openshift-mcp-server:
  fullnameOverride: openshift-mcp-server
  namespace: openshift-lightspeed
  litellm:
    enabled: true
    masterKey: "sk-openshift-mcp-1234"
    model:
      name: ""
      modelId: ""
      apiBase: ""
      apiKey: ""
    postgres:
      enabled: true
    route:
      enabled: true
      tls:
        termination: edge
  inspector:
    enabled: true
    route:
      enabled: true
  kubernetesMcp:
    enabled: true
    toolsets: "core"
  serviceAccount:
    create: true
    scope: cluster
    clusterRole: cluster-admin
  olsConfig:
    enabled: false
