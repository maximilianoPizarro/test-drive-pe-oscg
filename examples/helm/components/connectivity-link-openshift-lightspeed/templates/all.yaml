##
## 7. kubernetes-mcp-server — ConfigMap
##
apiVersion: v1
kind: ConfigMap
metadata:
  name: kubernetes-mcp-server
  namespace: openshift-lightspeed
  labels:
    app.kubernetes.io/component: k8s-mcp
  annotations:
    argocd.argoproj.io/sync-wave: "3"
data:
  config.toml: |
    log_level = 3
    port = "8085"
    read_only = false
    disable_destructive = false
    toolsets = ["core"]

    denied_resources = [
      {group = "rbac.authorization.k8s.io", version = "v1"}
    ]
  repositories.yaml: |
    apiVersion: ""
    generated: "0001-01-01T00:00:00Z"
    repositories:
      - caFile: ""
        certFile: ""
        insecure_skip_tls_verify: false
        keyFile: ""
        name: openshift-helm-charts
        password: ""
        url: https://charts.openshift.io/
        username: ""
---
##
## 8. kubernetes-mcp-server — Deployment
##
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubernetes-mcp-server
  namespace: openshift-lightspeed
  labels:
    app: kubernetes-mcp-server
    app.kubernetes.io/component: k8s-mcp
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kubernetes-mcp-server
  template:
    metadata:
      labels:
        app: kubernetes-mcp-server
        app.kubernetes.io/component: k8s-mcp
    spec:
      serviceAccountName: openshift-mcp-server
      tolerations:
        - key: node.kubernetes.io/disk-pressure
          operator: Exists
          effect: NoSchedule
      volumes:
        - name: config
          configMap:
            name: kubernetes-mcp-server
        - name: helm-cache
          emptyDir: {}
        - name: helm-data
          emptyDir: {}
      containers:
        - name: kubernetes-mcp-server
          image: "quay.io/redhat-user-workloads/crt-nshift-lightspeed-tenant/openshift-mcp-server:latest"
          imagePullPolicy: IfNotPresent
          command: ["/openshift-mcp-server"]
          args:
            - "--config"
            - "/etc/k8s-mcp/config.toml"
          env:
            - name: HELM_CACHE_HOME
              value: /tmp/helm/cache
            - name: HELM_CONFIG_HOME
              value: /tmp/helm/config
            - name: HELM_DATA_HOME
              value: /tmp/helm/data
          volumeMounts:
            - name: config
              mountPath: /etc/k8s-mcp/config.toml
              subPath: config.toml
              readOnly: true
            - name: config
              mountPath: /tmp/helm/config/repositories.yaml
              subPath: repositories.yaml
              readOnly: true
            - name: helm-cache
              mountPath: /tmp/helm/cache
            - name: helm-data
              mountPath: /tmp/helm/data
          ports:
            - containerPort: 8085
              protocol: TCP
              name: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
---
