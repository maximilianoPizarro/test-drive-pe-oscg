##
## LLM credentials for OLS provider
##
apiVersion: v1
kind: Secret
metadata:
  name: llm-credentials
  namespace: openshift-lightspeed
  annotations:
    argocd.argoproj.io/sync-wave: "1"
type: Opaque
stringData:
  apitoken: {{ .Values.llmApiKey | default "sk-no-key" | quote }}
---
##
## OLSConfig — LiteLLM + MCP servers for tool calling
##
apiVersion: ols.openshift.io/v1alpha1
kind: OLSConfig
metadata:
  name: cluster
  labels:
    app.kubernetes.io/part-of: connectivity-link-lightspeed
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  featureGates:
    - MCPServer
  llm:
    providers:
      - name: litellm
        type: openai
        url: {{ .Values.llmEndpoint | default "https://litellm-prod.apps.maas.redhatworkshops.io/v1" | quote }}
        credentialsSecretRef:
          name: llm-credentials
        models:
          - name: {{ .Values.llmModel | default "granite-3-2-8b-instruct" }}
  ols:
    defaultProvider: litellm
    defaultModel: {{ .Values.llmModel | default "granite-3-2-8b-instruct" }}
    logLevel: INFO
    querySystemPrompt: |
      You have MCP tool functions available. When the user asks about
      cluster resources or operations, you MUST call the appropriate tool.
      Do NOT suggest CLI commands — use tools instead.

      Tools are prefixed by server. Use the k8s_ prefix for Kubernetes operations:
        READING: k8s_pods_list, k8s_resources_list, k8s_resources_get,
          k8s_pods_log, k8s_pods_top, k8s_nodes_top, k8s_projects_list.
        CREATING/UPDATING: k8s_resources_create_or_update (pass valid YAML).
        DELETING: k8s_resources_delete.
        SCALING: k8s_resources_scale.

      Use the ocp_ prefix for OpenShift-specific operations:
        ocp_listPods, ocp_createDeployment, ocp_monitorDeployments, etc.

      Always prefer tools over documentation answers.
    deployment:
      api:
        replicas: 1
      console:
        replicas: 1
      dataCollector: {}
      database:
        replicas: 1
      llamaStack: {}
      mcpServer: {}
    conversationCache:
      type: postgres
      postgres:
        maxConnections: 2000
        sharedBuffers: 256MB
    introspectionEnabled: true
    userDataCollection: {}
  mcpServers:
    - name: mcp-gateway
      url: "http://mcp-gateway-istio.mcp-system.svc.cluster.local:8080/mcp"
      timeout: 120
