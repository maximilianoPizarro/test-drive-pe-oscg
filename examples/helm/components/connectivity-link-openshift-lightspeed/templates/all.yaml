##
## 4. OLSConfig — Lightspeed → MaaS LiteLLM + MCP servers
##
apiVersion: ols.openshift.io/v1alpha1
kind: OLSConfig
metadata:
  name: cluster
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  featureGates:
    - MCPServer
  llm:
    providers:
      - name: litellm
        type: openai
        url: "https://litellm-prod.apps.maas.redhatworkshops.io/v1"
        credentialsSecretRef:
          name: llm-credentials
        models:
          - name: llama-scout-17b
  ols:
    defaultProvider: litellm
    defaultModel: llama-scout-17b
    logLevel: INFO
    querySystemPrompt: |
      CRITICAL RULE: You have tool functions available. When the user asks about
      ANY cluster resource or operation, you MUST call the appropriate tool.
      DO NOT suggest CLI commands from the documentation below.

      For READING resources: use pods_list, resources_list, resources_get,
      pods_log, pods_top, nodes_top, projects_list.
      For CREATING/UPDATING resources: use resources_create_or_update with
      a valid YAML definition of the Kubernetes resource.
      For DELETING resources: use resources_delete.
      For SCALING: use resources_scale.

      ALWAYS prefer these tools over documentation. Never say the request
      is incomplete when you have tools that can answer it.
    deployment:
      api:
        replicas: 1
      console:
        replicas: 1
      dataCollector: {}
      database:
        replicas: 1
      llamaStack: {}
      mcpServer: {}
    mcpServers:
      - name: openshift-mcp-server
        url: "http://openshift-mcp-server.openshift-lightspeed.svc.cluster.local:8080/mcp"
        timeout: 30
      - name: kubernetes-mcp-server
        url: "http://kubernetes-mcp-server.openshift-lightspeed.svc.cluster.local:8085/mcp"
        timeout: 30
    conversationCache:
      type: postgres
      postgres:
        maxConnections: 2000
        sharedBuffers: 256MB
    introspectionEnabled: true
    userDataCollection: {}
---
##
## 5. openshift-mcp-server — Deployment
##
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openshift-mcp-server
  namespace: openshift-lightspeed
  labels:
    app: openshift-mcp-server
    app.kubernetes.io/component: mcp-server
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openshift-mcp-server
  template:
    metadata:
      labels:
        app: openshift-mcp-server
        app.kubernetes.io/component: mcp-server
    spec:
      serviceAccountName: openshift-mcp-server
      tolerations:
        - key: node.kubernetes.io/disk-pressure
          operator: Exists
          effect: NoSchedule
      containers:
        - name: openshift-mcp-server
          image: "quay.io/redhat-user-workloads/crt-nshift-lightspeed-tenant/openshift-mcp-server:latest"
          imagePullPolicy: IfNotPresent
          command: ["/openshift-mcp-server"]
          args:
            - "--port"
            - "8080"
            - "--toolsets"
            - "core,config,openshift"
          ports:
            - containerPort: 8080
              protocol: TCP
              name: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
---
