##
## 1. LLM Credentials Secret (for OLS → MaaS LiteLLM)
##
apiVersion: v1
kind: Secret
metadata:
  name: llm-credentials
  namespace: openshift-lightspeed
  labels:
    app.kubernetes.io/part-of: connectivity-link-lightspeed
  annotations:
    argocd.argoproj.io/sync-wave: "1"
type: Opaque
stringData:
  apitoken: "sk-9guuWZPNUC0zY5KS3kbFLA"
---
##
## 2. OLSConfig — MaaS LiteLLM + MCP servers
##
apiVersion: ols.openshift.io/v1alpha1
kind: OLSConfig
metadata:
  name: cluster
  labels:
    app.kubernetes.io/part-of: connectivity-link-lightspeed
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  featureGates:
    - MCPServer
  llm:
    providers:
      - name: litellm
        type: openai
        url: "https://litellm-prod.apps.maas.redhatworkshops.io/v1"
        credentialsSecretRef:
          name: llm-credentials
        models:
          - name: llama-scout-17b
  ols:
    defaultProvider: litellm
    defaultModel: llama-scout-17b
    logLevel: INFO
    querySystemPrompt: |
      You are Red Hat OpenShift Lightspeed, an intelligent assistant for OpenShift.
      You can answer questions about OpenShift concepts, troubleshooting, and best
      practices using the documentation provided below.

      You have MCP tool functions available. When the user asks about cluster
      resources or operations, try to use the appropriate tool if available.

      For cluster operations that require execution (create, delete, scale),
      an n8n AI Agent webhook is also available. Users can send requests to:

        curl -X POST https://n8n.{{ .Values.clusterDomain }}/webhook/lightspeed-agent \
          -H "Content-Type: application/json" \
          -d '{"prompt": "<request in natural language>"}'

      The AI Agent supports: create deployments/services/HPAs, list/get/delete
      resources, scale deployments, view pod logs, monitor deployments, and more.
    deployment:
      api:
        replicas: 1
      console:
        replicas: 1
      dataCollector: {}
      database:
        replicas: 1
      llamaStack: {}
      mcpServer: {}
    mcpServers:
      - name: openshift-mcp-server
        url: "http://field-content-ols.openshift-lightspeed.svc.cluster.local:8080/mcp"
        timeout: 120
      - name: kubernetes-mcp-server
        url: "http://field-content-ols-k8s-mcp.openshift-lightspeed.svc.cluster.local:8085/mcp"
        timeout: 120
    conversationCache:
      type: postgres
      postgres:
        maxConnections: 2000
        sharedBuffers: 256MB
    introspectionEnabled: true
    userDataCollection: {}
