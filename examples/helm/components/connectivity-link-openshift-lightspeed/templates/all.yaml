##
## 10. n8n — Deployment
##
apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n
  namespace: openshift-lightspeed
  labels:
    app: n8n
    app.kubernetes.io/component: workflow-automation
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: n8n
  template:
    metadata:
      labels:
        app: n8n
        app.kubernetes.io/component: workflow-automation
    spec:
      securityContext: {}
      tolerations:
        - key: node.kubernetes.io/disk-pressure
          operator: Exists
          effect: NoSchedule
      containers:
        - name: n8n
          image: "docker.n8n.io/n8nio/n8n:1.91.3"
          imagePullPolicy: IfNotPresent
          env:
            - name: N8N_LISTEN_ADDRESS
              value: "0.0.0.0"
            - name: N8N_PORT
              value: "5678"
            - name: N8N_PROTOCOL
              value: "https"
            - name: N8N_HOST
              value: "n8n.{{ .Values.clusterDomain }}"
            - name: WEBHOOK_URL
              value: "https://n8n.{{ .Values.clusterDomain }}/"
            - name: NODE_FUNCTION_ALLOW_BUILTIN
              value: "*"
            - name: NODE_FUNCTION_ALLOW_EXTERNAL
              value: "*"
            - name: N8N_SMTP_HOST
              value: "n8n-mailpit"
            - name: N8N_SMTP_PORT
              value: "1025"
            - name: N8N_SMTP_SSL
              value: "false"
          ports:
            - containerPort: 5678
              protocol: TCP
              name: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: false
            runAsNonRoot: true
---
