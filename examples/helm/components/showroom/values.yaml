# Showroom Lab Guide Configuration
showroom:
  enabled: true
  namespace: showroom
  name: showroom

  # Lab guide Git repository
  content:
    repoUrl: "https://github.com/maximilianoPizarro/showroom-from-zero-to-hero.git"
    repoRef: "main"
    antoraPlaybook: "site.yml"
    image: "quay.io/rhpds/showroom-content:v1.3.1"

  # Nookbag bundle (LlamaStack, Zero Trust UI) - disabled for this workshop
  nookbag:
    enabled: false
    bundleUrl: ""

  # Terminal configuration
  terminal:
    enabled: true
    image: "quay.io/rhpds/openshift-showroom-terminal-ocp:latest"
    resources:
      requests:
        cpu: "500m"
        memory: "512Mi"
      limits:
        cpu: "500m"
        memory: "1Gi"

# Injected by parent chart
deployer:
  domain: ""

# Used by userdata ConfigMap
demo:
  namespace: ""
  appName: ""
