apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: neuralbank-system
  namespace: default
  description: "Neuralbank — plataforma financiera de demostración pre-desplegada en el clúster"
  tags:
    - neuralbank
    - banking
    - demo
spec:
  owner: platform-engineering
  domain: banking

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: neuralbank-stack
  namespace: default
  description: "Neuralbank Stack — aplicación full-stack pre-desplegada (backend + frontend + database)"
  annotations:
    backstage.io/kubernetes-id: neuralbank-stack
    backstage.io/kubernetes-namespace: neuralbank-stack
    argocd/app-name: field-content-connectivity-link-neuralbank-stack
    argocd/app-namespace: openshift-gitops
    backstage.io/view-url: https://neuralbank-frontend-svc-neuralbank-stack.{{ clusterDomain }}
    backstage.io/techdocs-ref: dir:.
  tags:
    - neuralbank
    - full-stack
    - helm
    - postgresql
    - quarkus
  links:
    - url: https://neuralbank-frontend-svc-neuralbank-stack.{{ clusterDomain }}
      title: Frontend
      icon: web
    - url: https://neuralbank-backend-svc-neuralbank-stack.{{ clusterDomain }}/api/customers
      title: Backend API
      icon: api
spec:
  type: service
  lifecycle: production
  owner: platform-engineering
  system: neuralbank-system
  providesApis:
    - neuralbank-api
  subcomponentOf: null

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: neuralbank-stack-backend
  namespace: default
  description: "Neuralbank Backend — API REST Quarkus para gestión de créditos y clientes"
  annotations:
    backstage.io/kubernetes-id: neuralbank-stack
    backstage.io/kubernetes-namespace: neuralbank-stack
    backstage.io/kubernetes-label-selector: app=neuralbank-backend
    argocd/app-name: field-content-connectivity-link-neuralbank-stack
    argocd/app-namespace: openshift-gitops
  tags:
    - quarkus
    - java
    - rest-api
    - backend
spec:
  type: service
  lifecycle: production
  owner: platform-engineering
  system: neuralbank-system
  providesApis:
    - neuralbank-api
  dependsOn:
    - component:default/neuralbank-stack-database

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: neuralbank-stack-frontend
  namespace: default
  description: "Neuralbank Frontend — SPA web para visualización de créditos con tema OpenShift Commons"
  annotations:
    backstage.io/kubernetes-id: neuralbank-stack
    backstage.io/kubernetes-namespace: neuralbank-stack
    backstage.io/kubernetes-label-selector: app=neuralbank-frontend
    argocd/app-name: field-content-connectivity-link-neuralbank-stack
    argocd/app-namespace: openshift-gitops
  tags:
    - frontend
    - html
    - javascript
spec:
  type: website
  lifecycle: production
  owner: platform-engineering
  system: neuralbank-system
  consumesApis:
    - neuralbank-api
  dependsOn:
    - component:default/neuralbank-stack-backend

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: neuralbank-stack-database
  namespace: default
  description: "Neuralbank Database — PostgreSQL para persistencia de datos financieros"
  annotations:
    backstage.io/kubernetes-id: neuralbank-stack
    backstage.io/kubernetes-namespace: neuralbank-stack
    backstage.io/kubernetes-label-selector: app=neuralbank-db
    argocd/app-name: field-content-connectivity-link-neuralbank-stack
    argocd/app-namespace: openshift-gitops
  tags:
    - postgresql
    - database
spec:
  type: database
  lifecycle: production
  owner: platform-engineering
  system: neuralbank-system

---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: neuralbank-api
  namespace: default
  description: "Neuralbank REST API — endpoints para clientes, créditos y operaciones bancarias"
  tags:
    - rest
    - openapi
spec:
  type: openapi
  lifecycle: production
  owner: platform-engineering
  system: neuralbank-system
  definition: |
    openapi: "3.0.0"
    info:
      title: Neuralbank API
      description: API REST para gestión de créditos y clientes de Neuralbank
      version: "1.0.0"
    servers:
      - url: /api
    paths:
      /api/customers:
        get:
          summary: Listar clientes
          description: Retorna la lista completa de clientes registrados
          responses:
            '200':
              description: Lista de clientes
      /api/credits:
        get:
          summary: Listar créditos
          description: Retorna todos los créditos activos
          responses:
            '200':
              description: Lista de créditos
      /api/credits/{id}/update:
        put:
          summary: Actualizar estado de crédito
          parameters:
            - name: id
              in: path
              required: true
              schema:
                type: integer
          responses:
            '200':
              description: Crédito actualizado
