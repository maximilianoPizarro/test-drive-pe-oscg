apiVersion: v1
kind: Namespace
metadata:
  name: gitea
  annotations:
    argocd.argoproj.io/sync-wave: "1"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: gitea-data
  namespace: gitea
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gitea-config
  namespace: gitea
  annotations:
    argocd.argoproj.io/sync-wave: "2"
data:
  app.ini: |
    [database]
    DB_TYPE = sqlite3
    PATH = /data/gitea/gitea.db

    [server]
    DOMAIN = gitea.{{ .Values.clusterDomain }}
    ROOT_URL = https://gitea.{{ .Values.clusterDomain }}
    HTTP_PORT = 3000
    PROTOCOL = http
    DISABLE_SSH = true

    [service]
    DISABLE_REGISTRATION = false
    REQUIRE_SIGNIN_VIEW = false

    [repository]
    DEFAULT_BRANCH = main

    [oauth2]
    ENABLE = true

    [api]
    ENABLE_SWAGGER = true

    [webhook]
    ALLOWED_HOST_LIST = *
    SKIP_TLS_VERIFY = true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitea
  namespace: gitea
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: gitea
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gitea
    spec:
      containers:
        - name: gitea
          image: quay.io/gpte-devops-automation/gitea:latest
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: GITEA__database__DB_TYPE
              value: sqlite3
            - name: GITEA__database__PATH
              value: /data/gitea/gitea.db
          volumeMounts:
            - name: gitea-data
              mountPath: /data
            - name: gitea-config
              mountPath: /data/gitea/conf/app.ini
              subPath: app.ini
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /api/v1/version
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: gitea-data
          persistentVolumeClaim:
            claimName: gitea-data
        - name: gitea-config
          configMap:
            name: gitea-config
---
apiVersion: v1
kind: Service
metadata:
  name: gitea
  namespace: gitea
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  selector:
    app.kubernetes.io/name: gitea
  ports:
    - name: http
      port: 3000
      targetPort: 3000
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: gitea
  namespace: gitea
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  host: gitea.{{ .Values.clusterDomain }}
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  to:
    kind: Service
    name: gitea
    weight: 100
  wildcardPolicy: None
---
apiVersion: batch/v1
kind: Job
metadata:
  name: gitea-admin-setup
  namespace: gitea
  annotations:
    argocd.argoproj.io/sync-wave: "4"
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  template:
    spec:
      restartPolicy: Never
      serviceAccountName: default
      containers:
        - name: setup
          image: curlimages/curl:latest
          env:
            - name: ADMIN_USER
              value: {{ .Values.adminUser | quote }}
            - name: ADMIN_PASS
              value: {{ .Values.adminPassword | quote }}
            - name: ADMIN_EMAIL
              value: {{ .Values.adminEmail | quote }}
          command:
            - /bin/sh
            - -c
            - |
              set -e
              BASE="http://gitea.gitea.svc.cluster.local:3000"
              until curl -sf "$BASE/api/v1/version"; do
                sleep 3
              done
              USER_JSON=$(printf '%s' "{\"username\":\"${ADMIN_USER}\",\"password\":\"${ADMIN_PASS}\",\"email\":\"${ADMIN_EMAIL}\",\"must_change_password\":false,\"send_notify\":false}")
              CODE=$(curl -sS -o /tmp/user_resp -w "%{http_code}" -X POST "$BASE/api/v1/admin/users" \
                -H "Content-Type: application/json" \
                -d "$USER_JSON" || true)
              if [ "$CODE" != "201" ] && [ "$CODE" != "422" ]; then
                echo "admin user create failed: HTTP $CODE" >&2
                cat /tmp/user_resp >&2 || true
                exit 1
              fi
              ORG_JSON='{"username":"developer-hub","full_name":"Developer Hub"}'
              CODE2=$(curl -sS -o /tmp/org_resp -w "%{http_code}" -X POST "$BASE/api/v1/orgs" \
                -u "${ADMIN_USER}:${ADMIN_PASS}" \
                -H "Content-Type: application/json" \
                -d "$ORG_JSON" || true)
              if [ "$CODE2" != "201" ] && [ "$CODE2" != "422" ]; then
                echo "org create failed: HTTP $CODE2" >&2
                cat /tmp/org_resp >&2 || true
                exit 1
              fi
              echo "Creating 30 users..."
              for i in $(seq 1 30); do
                U_JSON=$(printf '{"username":"user%d","password":"Welcome123!","email":"user%d@developer-hub.local","must_change_password":false,"send_notify":false}' "$i" "$i")
                C=$(curl -sS -o /dev/null -w "%{http_code}" -X POST "$BASE/api/v1/admin/users" \
                  -u "${ADMIN_USER}:${ADMIN_PASS}" \
                  -H "Content-Type: application/json" \
                  -d "$U_JSON" || true)
                echo "user$i: $C"
                curl -sS -o /dev/null -w "" -X PUT "$BASE/api/v1/orgs/developer-hub/members/user$i" \
                  -u "${ADMIN_USER}:${ADMIN_PASS}" || true
              done
              echo "All users created."
  backoffLimit: 3
