apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: connectivity-link-prometheus-scrape
rules:
- apiGroups:
  - ""
  resources:
  - nodes
  - nodes/metrics
  - services
  - endpoints
  - pods
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - networking.k8s.io
  resources:
  - ingresses
  verbs:
  - get
  - list
  - watch
- nonResourceURLs:
  - /metrics
  - /metrics/cadvisor
  verbs:
  - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: connectivity-link-stack-prometheus-scrape
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: connectivity-link-prometheus-scrape
subjects:
- kind: ServiceAccount
  name: connectivity-link-stack-prometheus
  namespace: openshift-cluster-observability-operator
---
apiVersion: monitoring.rhobs/v1
kind: PodMonitor
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  labels:
    k8s-app: waypoint-monitor
    openshift.io/user-monitoring: "true"
  name: istio-waypoints-monitor
  namespace: openshift-cluster-observability-operator
spec:
  namespaceSelector:
    matchNames:
    - nfl-wallet-prod
    - nfl-wallet-test
  podMetricsEndpoints:
  - interval: 30s
    path: /stats/prometheus
    port: http-envoy-prom
  selector:
    matchExpressions:
    - key: gateway.networking.k8s.io/gateway-name
      operator: In
      values:
      - nfl-wallet-waypoint
---
