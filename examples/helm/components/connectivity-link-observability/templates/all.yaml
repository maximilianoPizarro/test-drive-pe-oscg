apiVersion: monitoring.rhobs/v1alpha1
kind: MonitoringStack
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    connectivity-link.redhat.com/stack: connectivity-link-stack
  name: connectivity-link-stack
  namespace: openshift-cluster-observability-operator
spec:
  alertmanagerConfig:
    disabled: false
  logLevel: info
  prometheusConfig:
    replicas: 1
  resourceSelector:
    matchLabels:
      openshift.io/user-monitoring: "true"
  retention: 7d
---
