# ============================================================
# Per-User DevSpaces Namespaces (dynamic, driven by .Values.userCount)
# Each user gets: Namespace + admin RoleBinding + ArgoCD RoleBinding + pipeline RoleBinding
# ============================================================
{{- $userCount := .Values.userCount | default 30 | int }}
{{- range $i := until $userCount }}
{{- $user := printf "user%d" (add1 $i) }}
{{- $ns := printf "%s-devspaces" $user }}
---
apiVersion: v1
kind: Namespace
metadata:
  name: {{ $ns }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/managed-by: openshift-gitops
  labels:
    purpose: developer-workspace
    user: {{ $user }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $user }}-admin
  namespace: {{ $ns }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: admin
subjects:
- apiGroup: rbac.authorization.k8s.io
  kind: User
  name: {{ $user }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argocd-admin
  namespace: {{ $ns }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: admin
subjects:
- kind: ServiceAccount
  name: openshift-gitops-argocd-application-controller
  namespace: openshift-gitops
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pipeline-image-pusher
  namespace: {{ $ns }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:image-builder
subjects:
- kind: ServiceAccount
  name: pipeline
  namespace: {{ $ns }}
{{- end }}
