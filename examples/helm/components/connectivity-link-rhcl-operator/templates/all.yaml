apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  name: neuralbank-app-writer
  namespace: neuralbank-stack
rules:
- apiGroups:
  - ""
  resources:
  - services
  - secrets
  - configmaps
  - serviceaccounts
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - apps
  resources:
  - deployments
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - gateway.networking.k8s.io
  resources:
  - gateways
  - httproutes
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - route.openshift.io
  resources:
  - routes
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - kuadrant.io
  resources:
  - authpolicies
  - kuadrants
  - ratelimitpolicies
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - extensions.kuadrant.io
  resources:
  - oidcpolicies
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  name: neuralbank-app-binding
  namespace: neuralbank-stack
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: neuralbank-app-writer
subjects:
- kind: ServiceAccount
  name: openshift-gitops-argocd-application-controller
  namespace: openshift-gitops
---
apiVersion: kuadrant.io/v1beta1
kind: Kuadrant
metadata:
  name: kuadrant
  namespace: kuadrant-system
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  observability:
    enable: true
  mtls:
    enable: true
    authorino: true
    limitador: true
  components:
    developerPortal:
      enabled: true
---
apiVersion: extensions.kuadrant.io/v1alpha1
kind: OIDCPolicy
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "4"
  name: neuralbank-oidc
  namespace: neuralbank-stack
spec:
  auth:
    tokenSource:
      authorizationHeader:
        prefix: Bearer
      cookie:
        name: jwt
  provider:
    authorizationEndpoint: https://rhbk.{{ .Values.clusterDomain }}/realms/neuralbank/protocol/openid-connect/auth
    clientID: neuralbank-frontend
    issuerURL: https://rhbk.{{ .Values.clusterDomain }}/realms/neuralbank
    redirectURI: https://neuralbank.{{ .Values.clusterDomain }}/auth/callback
    tokenEndpoint: https://rhbk.{{ .Values.clusterDomain }}/realms/neuralbank/protocol/openid-connect/token
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: neuralbank-api-route
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "4"
    networking.istio.io/service-type: ClusterIP
    kuadrant.io/namespace: kuadrant-system
  name: neuralbank-gateway
  namespace: neuralbank-stack
spec:
  gatewayClassName: istio
  listeners:
  - allowedRoutes:
      namespaces:
        from: All
    name: http
    port: 8080
    protocol: HTTP
  - allowedRoutes:
      namespaces:
        from: All
    name: https
    port: 443
    protocol: HTTPS
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "4"
  name: neuralbank-api-route
  namespace: neuralbank-stack
spec:
  hostnames:
  - neuralbank.{{ .Values.clusterDomain }}
  parentRefs:
  - name: neuralbank-gateway
    namespace: neuralbank-stack
  rules:
  - backendRefs:
    - name: neuralbank-backend-svc
      port: 8080
    matches:
    - path:
        type: PathPrefix
        value: /api
    - path:
        type: PathPrefix
        value: /q
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "4"
  name: neuralbank-root-route
  namespace: neuralbank-stack
spec:
  hostnames:
  - neuralbank.{{ .Values.clusterDomain }}
  parentRefs:
  - name: neuralbank-gateway
    namespace: neuralbank-stack
  rules:
  - backendRefs:
    - name: neuralbank-backend-svc
      port: 8080
    matches:
    - path:
        type: PathPrefix
        value: /swagger-ui
  - backendRefs:
    - name: neuralbank-frontend-svc
      port: 8080
    matches:
    - path:
        type: PathPrefix
        value: /
---
apiVersion: kuadrant.io/v1
kind: RateLimitPolicy
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "4"
  name: neuralbank-customers-ratelimit
  namespace: neuralbank-stack
spec:
  limits:
    customers-api-per-user:
      when:
      - predicate: "request.path.matches('/api/customers')"
      - predicate: "auth.identity.username == 'Javier Rodríguez Torres'"
      counters:
      - expression: auth.identity.username
      rates:
      - limit: 10
        window: 1m
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: neuralbank-api-route
---
apiVersion: kuadrant.io/v1
kind: AuthPolicy
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "4"
  name: neuralbank-apikey
  namespace: neuralbank-stack
  labels:
    backstage.io/kubernetes-id: neuralbank-backend
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: neuralbank-api-route
  defaults:
    rules:
      authentication:
        api-key-auth:
          apiKey:
            allNamespaces: true
            selector:
              matchLabels:
                app: neuralbank
                kuadrant.io/apikey: "true"
          credentials:
            customHeader:
              name: X-API-Key
          metrics: false
          priority: 0
      response:
        success: {}
        unauthenticated:
          code: 401
          body:
            value: '{"error":"Invalid or missing API key. Include header X-API-Key with a valid key."}'
          headers:
            content-type:
              value: "application/json"
---
apiVersion: v1
kind: Secret
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  name: neuralbank-apikey-demo
  namespace: neuralbank-stack
  labels:
    app: neuralbank
    kuadrant.io/apikey: "true"
    authorino.kuadrant.io/managed-by: authorino
    secret.kuadrant.io/plan-id: basic
type: Opaque
stringData:
  api_key: neuralbank-demo-key-2024
---
apiVersion: extensions.kuadrant.io/v1alpha1
kind: PlanPolicy
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "5"
  name: neuralbank-plans
  namespace: neuralbank-stack
  labels:
    backstage.io/kubernetes-id: neuralbank-backend
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: neuralbank-api-route
  plans:
    - tier: free
      predicate: |
        has(auth.identity) && auth.identity.metadata.annotations["secret.kuadrant.io/plan-id"] == "free"
      limits:
        daily: 100
        custom:
          - limit: 10
            window: "1m"
    - tier: basic
      predicate: |
        has(auth.identity) && auth.identity.metadata.annotations["secret.kuadrant.io/plan-id"] == "basic"
      limits:
        daily: 1000
        custom:
          - limit: 60
            window: "1m"
    - tier: pro
      predicate: |
        has(auth.identity) && auth.identity.metadata.annotations["secret.kuadrant.io/plan-id"] == "pro"
      limits:
        daily: 10000
        custom:
          - limit: 300
            window: "1m"
---
apiVersion: devportal.kuadrant.io/v1alpha1
kind: APIProduct
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "5"
  name: neuralbank-api
  namespace: neuralbank-stack
  labels:
    backstage.io/kubernetes-id: neuralbank-backend
spec:
  displayName: "Neuralbank — Credit Management API"
  description: |
    API REST de gestión de créditos y clientes para Neuralbank.
    Protegida con API Key (header X-API-Key) y planes de rate limiting (free/basic/pro).
    Base path: /api/v1/customers
  version: "v1"
  publishStatus: Published
  approvalMode: automatic
  tags:
    - fintech
    - banking
    - api-key
    - kuadrant
    - rest
  contact:
    team: Platform Engineering
    email: platform@neuralbank.dev
  documentation:
    openAPISpecURL: "https://neuralbank.{{ .Values.clusterDomain }}/q/openapi"
    swaggerUI: "https://neuralbank.{{ .Values.clusterDomain }}/q/swagger-ui"
    gitRepository: "https://github.com/maximilianoPizarro/test-drive-pe-oscg"
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: neuralbank-api-route
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "4"
    haproxy.router.openshift.io/timeout: 300s
  name: neuralbank-external-route
  namespace: neuralbank-stack
spec:
  host: neuralbank.{{ .Values.clusterDomain }}
  port:
    targetPort: http
  tls:
    insecureEdgeTerminationPolicy: Redirect
    termination: edge
  to:
    kind: Service
    name: neuralbank-gateway-istio
    weight: 100
