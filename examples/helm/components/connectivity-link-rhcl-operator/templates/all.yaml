apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  name: neuralbank-app-writer
  namespace: neuralbank-stack
rules:
- apiGroups:
  - ""
  resources:
  - services
  - secrets
  - configmaps
  - serviceaccounts
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - apps
  resources:
  - deployments
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - gateway.networking.k8s.io
  resources:
  - gateways
  - httproutes
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - route.openshift.io
  resources:
  - routes
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - kuadrant.io
  resources:
  - authpolicies
  - kuadrants
  - ratelimitpolicies
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - extensions.kuadrant.io
  resources:
  - oidcpolicies
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  name: neuralbank-app-binding
  namespace: neuralbank-stack
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: neuralbank-app-writer
subjects:
- kind: ServiceAccount
  name: openshift-gitops-argocd-application-controller
  namespace: openshift-gitops
---
apiVersion: extensions.kuadrant.io/v1alpha1
kind: OIDCPolicy
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "5"
  name: neuralbank-oidc
  namespace: neuralbank-stack
spec:
  auth:
    tokenSource:
      authorizationHeader:
        name: Authorization
        prefix: Bearer
      cookie:
        name: jwt
  provider:
    authorizationEndpoint: https://rhbk.apps.cluster-8wffz.dynamic.redhatworkshops.io/realms/neuralbank/protocol/openid-connect/auth
    clientID: neuralbank-frontend
    clientSecret: FYtNXAyn6eRmWxHIig7oLhK3zxQ1nLaF
    issuerURL: https://rhbk.apps.cluster-8wffz.dynamic.redhatworkshops.io/realms/neuralbank
    redirectURI: https://neuralbank.apps.cluster-8wffz.dynamic.redhatworkshops.io/auth/callback
    tokenEndpoint: https://rhbk.apps.cluster-8wffz.dynamic.redhatworkshops.io/realms/neuralbank/protocol/openid-connect/token
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: neuralbank-api-route
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  annotations:
    argocd.argoproj.io/ignore-healthcheck: "true"
    argocd.argoproj.io/sync-wave: "4"
  name: neuralbank-gateway
  namespace: neuralbank-stack
spec:
  gatewayClassName: istio
  listeners:
  - allowedRoutes:
      namespaces:
        from: All
    name: http
    port: 8080
    protocol: HTTP
  - allowedRoutes:
      namespaces:
        from: All
    name: https
    port: 443
    protocol: HTTPS
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "5"
  name: neuralbank-api-route
  namespace: neuralbank-stack
spec:
  hostnames:
  - neuralbank.apps.cluster-8wffz.dynamic.redhatworkshops.io
  parentRefs:
  - name: neuralbank-gateway
    namespace: neuralbank-stack
  rules:
  - backendRefs:
    - name: neuralbank-backend-svc
      port: 8080
    matches:
    - path:
        type: PathPrefix
        value: /api
    - path:
        type: PathPrefix
        value: /q
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "5"
  name: neuralbank-root-route
  namespace: neuralbank-stack
spec:
  hostnames:
  - neuralbank.apps.cluster-8wffz.dynamic.redhatworkshops.io
  parentRefs:
  - name: neuralbank-gateway
    namespace: neuralbank-stack
  rules:
  - backendRefs:
    - name: neuralbank-backend-svc
      port: 8080
    matches:
    - path:
        type: PathPrefix
        value: /swagger-ui
  - backendRefs:
    - name: neuralbank-frontend-svc
      port: 8080
    matches:
    - path:
        type: PathPrefix
        value: /
---
apiVersion: kuadrant.io/v1
kind: RateLimitPolicy
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "6"
  name: neuralbank-customers-ratelimit
  namespace: neuralbank-stack
spec:
  limits:
    customers-api-per-user:
      conditions:
      - operator: matches
        selector: request.path
        value: /api/customers
      - operator: equals
        selector: auth.identity.username
        value: Javier Rodríguez Torres
      counters:
      - expression: auth.identity.username
      rates:
      - limit: 10
        window: 1m
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: neuralbank-api-route
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "6"
    haproxy.router.openshift.io/timeout: 300s
  name: neuralbank-external-route
  namespace: neuralbank-stack
spec:
  host: neuralbank.apps.cluster-8wffz.dynamic.redhatworkshops.io
  port:
    targetPort: http
  tls:
    insecureEdgeTerminationPolicy: Redirect
    termination: edge
  to:
    kind: Service
    name: neuralbank-gateway-istio
    weight: 100
