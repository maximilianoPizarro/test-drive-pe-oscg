# Field Content Demo - App of Apps
# This chart deploys multiple components as separate ArgoCD Applications

# ============================================================
# GitOps Configuration
# ============================================================
gitops:
  # Repository containing the component charts
  repoUrl: "https://github.com/rhpds/field-sourced-content-template.git"
  revision: "main"
  basePath: "examples/helm"

# ArgoCD settings
argocd:
  namespace: openshift-gitops
  project: default

# ============================================================
# Components - Enable/disable and configure each component
# ============================================================
components:

  # --- Connectivity Link Operators (external GitLab repo) ---
  # Imports operators from connectivity-link: RHCL, Service Mesh, Dev Spaces,
  # RHBK, RHDH, OpenTelemetry, Pipelines, Grafana, Kiali
  # Source: https://gitlab.com/maximilianoPizarro/connectivity-link/-/blob/main/operators/Chart.yaml
  connectivityLinkOperators:
    enabled: false
    repoUrl: "https://gitlab.com/maximilianoPizarro/connectivity-link.git"
    revision: "main"
    path: "operators"
    prune: true
    selfHeal: true
    channel: "stable-4.20"
    version: "4.20.4"
    # Helm values for subscriptions (templates/subscriptions.yaml)
    # RHCL, OpenTelemetry, DevSpaces, RHBK, RHDH, Pipelines: via templates/*.yaml
    subscriptions:
      - name: servicemeshoperator3
        namespace: openshift-operators
        channel: stable
        source: redhat-operators
      - name: cluster-observability-operator
        namespace: openshift-cluster-observability-operator
        channel: stable
        source: redhat-operators
      - name: grafana-operator
        namespace: openshift-operators
        channel: v5
        source: community-operators
      - name: kiali-ossm
        namespace: openshift-operators
        channel: stable
        source: redhat-operators

  # --- Operator Installation ---
  operator:
    # Set to true to install the operator via OLM
    # Set to false if operator is already installed on cluster
    enabled: false
    name: web-terminal
    namespace: openshift-operators
    channel: fast
    source: redhat-operators
    sourceNamespace: openshift-marketplace
    installPlanApproval: Automatic

  # --- Hello World Demo Application ---
  helloWorld:
    enabled: true
    namespace: terminal-demo
    appName: hello-world
    replicas: 1
    image: registry.redhat.io/ubi8/httpd-24:latest
    # User information for RHDP integration
    userInfo:
      enabled: true
      title: "Web Terminal Demo"
      instructions: "Access the Showroom lab guide, then click the terminal icon (>_) in the OpenShift console."

  # --- Showroom Lab Guide ---
  showroom:
    enabled: true
    namespace: showroom
    name: showroom
    # Lab guide Git repository - IA Development From Zero To Hero (MCP Agents on OpenShift AI)
    content:
      repoUrl: "https://github.com/maximilianoPizarro/showroom-from-zero-to-hero.git"
      repoRef: "main"
      antoraPlaybook: "site.yml"
      image: "quay.io/rhpds/showroom-content:v1.3.1"
    # Nookbag bundle (enables LlamaStack, multiple terminals, Zero Trust UI)
    nookbag:
      enabled: true
      bundleUrl: "https://github.com/rhpds/nookbag/releases/download/nookbag-v0.2.1/nookbag-v0.2.1.zip"
    # Embedded terminal configuration
    terminal:
      enabled: true
      image: "quay.io/rhpds/openshift-showroom-terminal-ocp:latest"
      resources:
        requests:
          cpu: "500m"
          memory: "512Mi"
        limits:
          cpu: "500m"
          memory: "1Gi"

# ============================================================
# Values injected by field content workload (do not modify)
# ============================================================
deployer:
  domain: ""
  apiUrl: ""

fieldContent:
  deploymentType: "helm"
