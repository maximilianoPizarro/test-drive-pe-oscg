# Field Content Demo - App of Apps
# This chart deploys multiple components as separate ArgoCD Applications

# ============================================================
# GitOps Configuration
# ============================================================
gitops:
  # Repository containing the component charts (your fork or this template)
  repoUrl: "https://github.com/maximilianoPizarro/field-sourced-content-template.git"
  revision: "main"
  basePath: "examples/helm"

# ArgoCD settings
argocd:
  namespace: openshift-gitops
  project: default

# ============================================================
# Connectivity Link (vendored from GitLab connectivity-link)
# One Argo CD Application per entry; paths under components/connectivity-link-*
# ============================================================
connectivityLink:
  operators:
    channel: stable-4.20
    version: 4.20.4
    # servicemeshoperator3: templates/servicemeshoperator3.yaml (omit here to avoid duplicate)
    subscriptions:
      - name: cluster-observability-operator
        namespace: openshift-cluster-observability-operator
        channel: stable
        source: redhat-operators
      - name: grafana-operator
        namespace: openshift-operators
        channel: v5
        source: community-operators
      - name: kiali-ossm
        namespace: openshift-operators
        channel: stable
        source: redhat-operators

  # neuralbank-stack — Keycloak URLs derived from deployer.domain when synced
  neuralbank:
    global:
      postgresql:
        auth:
          postgresPassword: "supersecretpassword"
          username: "neuralbank"
          password: "neuralbank123!"
          database: "neuralbank"
    backend:
      image:
        repository: quay.io/maximilianopizarro/neuralbank-backend
        tag: "latest"
        pullPolicy: Always
      service:
        port: 8080
      replicaCount: 1
    frontend:
      image:
        repository: quay.io/maximilianopizarro/neuralbank-front
        tag: "pkce"
        pullPolicy: Always
      service:
        port: 8080
      replicaCount: 1
    keycloak:
      clientId: "neuralbank-frontend"
      clientSecret: ""
      issuerUrl: ""
      authorizationEndpoint: ""
      redirectUri: ""
      tokenEndpoint: ""
      postLogoutRedirectUri: ""
    api:
      baseUrl: "/api"

  # Argo CD Applications (order via sync-wave on Application metadata)
  apps:
    - id: connectivity-link-namespaces
      enabled: true
      path: connectivity-link-namespaces
      destinationNamespace: openshift-gitops
      syncWave: "1"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: false
    - id: connectivity-link-openshift-gitops
      enabled: true
      path: connectivity-link-openshift-gitops
      destinationNamespace: openshift-gitops
      syncWave: "0"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: true
    - id: connectivity-link-operators
      enabled: true
      path: connectivity-link-operators
      destinationNamespace: openshift-operators
      syncWave: "2"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: true
    - id: connectivity-link-servicemeshoperator3
      enabled: true
      path: connectivity-link-servicemeshoperator3
      destinationNamespace: openshift-operators
      syncWave: "3"
      prune: false
      selfHeal: true
      skipDryRunOnMissingResource: true
    - id: connectivity-link-rhbk
      enabled: true
      path: connectivity-link-rhbk
      destinationNamespace: rhbk-operator
      syncWave: "2"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: true
    - id: connectivity-link-developer-hub
      enabled: true
      path: connectivity-link-developer-hub
      destinationNamespace: developer-hub
      syncWave: "3"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: true
    - id: connectivity-link-rhcl-operator
      enabled: true
      path: connectivity-link-rhcl-operator
      destinationNamespace: kuadrant-system
      syncWave: "6"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: true
    - id: connectivity-link-observability
      enabled: true
      path: connectivity-link-observability
      destinationNamespace: openshift-cluster-observability-operator
      syncWave: "5"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: true
    - id: connectivity-link-kiali
      enabled: true
      path: connectivity-link-kiali
      destinationNamespace: openshift-cluster-observability-operator
      syncWave: "6"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: true
    - id: connectivity-link-opentelemetry
      enabled: true
      path: connectivity-link-opentelemetry
      destinationNamespace: openshift-opentelemetry
      syncWave: "6"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: true
    - id: connectivity-link-litemaas
      enabled: true
      path: connectivity-link-litemaas
      destinationNamespace: litemaas
      syncWave: "6"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: true
    - id: connectivity-link-openshift-ai
      enabled: true
      path: connectivity-link-openshift-ai
      destinationNamespace: openshift-ai
      syncWave: "6"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: true
    - id: connectivity-link-devspaces
      enabled: true
      path: connectivity-link-devspaces
      destinationNamespace: devspaces
      syncWave: "7"
      prune: false
      selfHeal: true
      skipDryRunOnMissingResource: true
    - id: connectivity-link-neuralbank-stack
      enabled: true
      path: connectivity-link-neuralbank-stack
      destinationNamespace: neuralbank-stack
      syncWave: "5"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: true
    - id: ols
      enabled: true
      path: connectivity-link-openshift-lightspeed
      destinationNamespace: openshift-lightspeed
      syncWave: "8"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: true
    - id: mcp-gateway
      enabled: true
      path: connectivity-link-mcp-gateway
      destinationNamespace: mcp-system
      syncWave: "9"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: true
    - id: gitea
      enabled: true
      path: connectivity-link-gitea
      destinationNamespace: gitea
      syncWave: "3"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: false
    - id: workshop-registration
      enabled: true
      path: connectivity-link-workshop-registration
      destinationNamespace: showroom
      syncWave: "10"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: false

# ============================================================
# Lightspeed / MCP — LLM provider config for OLS component
# Keys are injected at deploy time (RHDP or --set), NOT in git
# ============================================================
lightspeed:
  llmApiKey: "sk-no-key"
  llmEndpoint: "https://qwen3-8b-my-first-model.apps.cluster-l9nhj.dynamic.redhatworkshops.io/v1"
  model: "qwen3-8b"

# ============================================================
# LiteMaaS / MaaS (optional — injected by RHDP when enabled on order)
# ============================================================
litemaas:
  apiUrl: ""
  apiKey: ""
  model: ""

# ============================================================
# Workshop Registration Portal
# ============================================================
workshopRegistration:
  adminToken: "workshop-admin-2024"
  keycloakAdminPassword: ""

# ============================================================
# Components - Enable/disable and configure each component
# ============================================================
components:

  # --- Operator Installation (single OLM subscription, template repo) ---
  operator:
    enabled: false
    name: web-terminal
    namespace: openshift-operators
    channel: fast
    source: redhat-operators
    sourceNamespace: openshift-marketplace
    installPlanApproval: Automatic

  # --- Hello World Demo Application ---
  helloWorld:
    enabled: true
    namespace: terminal-demo
    appName: hello-world
    replicas: 1
    image: registry.redhat.io/ubi8/httpd-24:latest
    userInfo:
      enabled: true
      title: "Web Terminal Demo"
      instructions: "Access the Showroom lab guide, then click the terminal icon (>_) in the OpenShift console."

  # --- Showroom Lab Guide ---
  showroom:
    enabled: true
    namespace: showroom
    name: showroom
    content:
      repoUrl: "https://github.com/maximilianoPizarro/showroom-from-zero-to-hero.git"
      repoRef: "main"
      antoraPlaybook: "site.yml"
      image: "quay.io/rhpds/showroom-content:v1.3.1"
    nookbag:
      enabled: true
      bundleUrl: "https://github.com/rhpds/nookbag/releases/download/nookbag-v0.2.1/nookbag-v0.2.1.zip"
    terminal:
      enabled: true
      image: "quay.io/rhpds/openshift-showroom-terminal-ocp:latest"
      resources:
        requests:
          cpu: "500m"
          memory: "512Mi"
        limits:
          cpu: "500m"
          memory: "1Gi"

# ============================================================
# Values injected by field content workload (do not modify)
# ============================================================
deployer:
  domain: "apps.cluster-l9nhj.dynamic.redhatworkshops.io"
  apiUrl: ""

fieldContent:
  deploymentType: "helm"
