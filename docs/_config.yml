title: "From Zero To Hero with Red Hat Developer Hub"
description: "Workshop — Neuralbank on OpenShift — OpenShift Commons"
baseurl: "/field-sourced-content-template"
url: "https://maximilianopizarro.github.io"
remote_theme: just-the-docs/just-the-docs@v0.10.0
color_scheme: custom
logo: "/assets/images/openshift-commons-logo.svg"

aux_links:
  "Red Hat Developers":
    - "https://developers.redhat.com"
  "OpenShift Commons":
    - "https://commons.openshift.org"
  "GitHub":
    - "https://github.com/maximilianoPizarro/field-sourced-content-template"
aux_links_new_tab: true

footer_content: 'Created by <a href="https://github.com/maximilianoPizarro">maximilianoPizarro</a> · Powered by <a href="https://developers.redhat.com/rhdh">Red Hat Developer Hub</a> &amp; <a href="https://commons.openshift.org">OpenShift Commons</a>'

mermaid:
  version: "10.9.0"

enable_copy_code_button: true

plugins:
  - jekyll-remote-theme

exclude:
  - Gemfile
  - Gemfile.lock
